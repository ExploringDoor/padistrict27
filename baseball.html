<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Baseball Tournaments · PA District 27 Little League</title>
<meta name="description" content="Every D27 baseball tournament — Little League International (BB-10 through BB-SR), District 27 Special Games, Section 8, and the PA State Championship. Live brackets and schedules." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css" />

<style>
  /* Page-specific tournament hub styles */
  .hub-hero {
    background:
      linear-gradient(90deg, rgba(4,16,42,.94) 0%, rgba(4,16,42,.80) 40%, rgba(4,16,42,.44) 72%, rgba(4,16,42,.22) 100%),
      url('assets/baseball.jpg') center/cover no-repeat,
      var(--d27-navy);
    color: var(--d27-white);
    padding: var(--space-7) 0 var(--space-6);
  }
  .hub-hero .crumb {
    font-family: 'Oswald', sans-serif;
    font-size: var(--text-xs);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold);
    margin-bottom: var(--space-3);
  }
  .hub-hero .crumb a { color: rgba(255,255,255,.6); text-decoration: none; }
  .hub-hero .crumb a:hover { color: var(--d27-white); }
  .hub-hero h1 { color: var(--d27-white); font-size: clamp(2.25rem, 4vw, var(--text-4xl)); margin-bottom: var(--space-3); }
  .hub-hero p { color: rgba(255,255,255,.82); font-size: var(--text-lg); max-width: 60ch; margin-bottom: var(--space-5); }
  .hub-hero p a { color: #FF5247; font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
  .hub-hero p a:hover { color: #ff7a72; }
  .hub-stats { display: flex; gap: var(--space-6); flex-wrap: wrap; }
  .hub-stat .n { font-family: 'Oswald', sans-serif; font-size: var(--text-3xl); font-weight: 600; color: var(--gold); display: block; line-height: 1; }
  .hub-stat .l { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,.7); }

  /* Tournament card grid */
  .tcards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: var(--space-4);
  }
  .tcard {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--fg);
    display: flex;
    flex-direction: column;
    transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease;
    position: relative;
  }
  .tcard:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--d27-navy);
    text-decoration: none;
  }
  .tcard-banner {
    padding: var(--space-4);
    background: linear-gradient(135deg, var(--d27-navy) 0%, var(--d27-navy-dark) 100%);
    color: var(--d27-white);
    position: relative;
  }
  .tcard-banner.special { background: linear-gradient(135deg, var(--d27-red) 0%, var(--d27-red-dark) 100%); }
  .tcard-banner.section { background: linear-gradient(135deg, #334155 0%, #1E293B 100%); }
  .tcard-kicker {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.72);
    display: block;
    margin-bottom: 4px;
  }
  .tcard h3 {
    color: var(--d27-white);
    margin: 0;
    font-size: var(--text-xl);
    line-height: 1.1;
  }
  .tcard-age {
    margin-top: var(--space-2);
    font-family: 'Oswald', sans-serif;
    font-size: var(--text-sm);
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .tcard-body {
    padding: var(--space-4);
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .tcard-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--text-sm);
  }
  .tcard-row .k { color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: var(--text-xs); font-family: 'Oswald', sans-serif; }
  .tcard-row .v { color: var(--fg); font-weight: 500; text-align: right; }
  .tcard-row .v strong { color: var(--d27-navy); font-family: 'Oswald', sans-serif; font-size: var(--text-base); }

  /* Status badges inside cards */
  .tstatus {
    position: absolute;
    top: var(--space-4);
    right: var(--space-4);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: rgba(255,255,255,.18);
    color: var(--d27-white);
    backdrop-filter: blur(4px);
  }
  .tstatus.live { background: #FF3B30; animation: livepulse 1.8s infinite; }
  .tstatus.upcoming { background: rgba(201,162,39,.9); color: var(--d27-ink); }
  .tstatus.complete { background: rgba(22,163,74,.85); }

  /* Card action buttons + empty state + loading (data-driven hub) */
  .tcard-actions { display: flex; gap: var(--space-2); padding: var(--space-3) var(--space-4); background: var(--d27-sub); border-top: 1px solid var(--line); }
  .tbtn { flex: 1; text-align: center; padding: 9px 10px; border-radius: 6px; font-family: 'Oswald', sans-serif; font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; border: 1.5px solid var(--d27-navy); color: var(--d27-navy); background: var(--surface); transition: all .12s ease; }
  .tbtn:hover { background: var(--d27-navy); color: var(--d27-white); text-decoration: none; }
  .tbtn.primary { background: var(--d27-navy); color: var(--d27-white); }
  .tbtn.primary:hover { background: var(--d27-navy-dark); }
  .tcard-empty { flex-direction: row; align-items: center; gap: var(--space-3); padding: var(--space-5); border-style: dashed; }
  .tcard-empty:hover { transform: none; box-shadow: none; border-color: var(--line); }
  .tcard-empty .ce-ico { font-size: 2rem; opacity: .5; }
  .tcard-empty h3 { color: var(--fg); margin: 0 0 2px; font-size: var(--text-lg); }
  .tcard-empty p { margin: 0; font-size: var(--text-sm); color: var(--muted); }
  .hub-loading { padding: var(--space-6); text-align: center; color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: .04em; }

  .type-group { margin-bottom: var(--space-7); }
  .type-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--space-4);
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-3);
    border-bottom: 2px solid var(--d27-navy);
  }
  .type-head h2 { margin: 0; }
  .type-head .eyebrow {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: var(--text-xs);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .type-head .count {
    font-family: 'Oswald', sans-serif;
    font-size: var(--text-sm);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="d27-nav"></div>

<!-- Hub hero --------------------------------------------------------- -->
<header class="hub-hero">
  <div class="container">
    <div class="crumb">
      <a href="index.html">Home</a> &nbsp;/&nbsp; Baseball
    </div>
    <h1>Baseball Tournaments · 2026</h1>
    <p>
      Every D27 baseball tournament — Little League International divisions,
      Section&nbsp;8, and the Pennsylvania State Championship. Tap any tournament
      for its live bracket and schedule. <a href="special-games.html">District&nbsp;27 Special Games →</a>
    </p>
    <div class="hub-stats" id="hubStats"></div>
  </div>
</header>

<!-- Tournament hub (data-driven from live schedules) ----------------- -->
<main class="container section-tight" id="hub">
  <div class="hub-loading">Loading tournaments…</div>
</main>

<div id="d27-footer"></div>

<script src="js/d27-data.js"></script>
<script src="js/d27-bracket.js"></script>
<script src="js/d27-hub.js"></script>
<script src="js/d27-chrome.js"></script>
<script>
  D27renderHub({
    sport: 'Baseball',
    hubId: 'hub',
    statsId: 'hubStats',
    sections: [
      { cat: 'LL International — Baseball', eyebrow: 'Little League International', title: 'International Tournaments', accent: '' },
      { cat: 'Sectional',                  eyebrow: 'Section 8',                  title: 'Sectional Schedules',     accent: 'section', soon: 'Section 8 brackets will be posted here once D27 teams advance and the section schedule is set.' },
      { cat: 'State',                      eyebrow: 'Pennsylvania',               title: 'State Tournament',        accent: 'section', soon: 'PA State tournament schedules will be posted here once teams advance out of Section 8.' },
    ],
  });
</script>

</body>
</html>
