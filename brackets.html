<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Tournament Brackets · PA District 27 Little League</title>
<meta name="description" content="Live PA District 27 tournament brackets — winners auto-advance as games finish." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<script src="js/d27-data.js"></script>
<script src="js/d27-logos.js"></script>
<script src="js/d27-gamemodal.js"></script>
<script src="js/d27-chrome.js"></script>
<style>
  body { background: var(--d27-paper); }

  .bk-bar { background: var(--surface); border-bottom: 1px solid var(--line); padding: 16px 0; }
  .bk-bar-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .bk-bar-title { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .view-link { font-size: 13px; color: var(--d27-navy); font-weight: 600; text-decoration: none; border-bottom: 1px dashed var(--d27-gold); padding-bottom: 1px; }
  .bk-tools .view-link { margin-right: 10px; align-self: center; }
  .bk-tools .view-link:hover { color: var(--d27-red); }
  .bk-cat { margin-bottom: 12px; }
  .bk-cat:last-child { margin-bottom: 0; }
  .bk-cat-label { display: block; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--d27-red); margin-bottom: 8px; }
  .bk-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .bk-chip { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: .02em; text-transform: uppercase; color: var(--d27-navy); background: var(--surface); border: 1.5px solid var(--line); border-radius: 8px; padding: 10px 18px; cursor: pointer; transition: all .12s ease; white-space: nowrap; }
  .bk-chip:hover { border-color: var(--d27-navy); background: var(--d27-sub); }
  .bk-chip.active { background: var(--d27-navy); color: #fff; border-color: var(--d27-navy); box-shadow: 0 4px 14px rgba(0,45,114,.28); }

  /* Branded bracket title band — tournament name lives here (logos drop in later) */
  .bk-title { background: linear-gradient(120deg, var(--d27-navy), var(--d27-navy-dark)); color: #fff; border-radius: 12px; padding: 22px 26px; margin: 22px 0 8px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; position: relative; overflow: hidden; }
  .bk-title::after { content: ''; position: absolute; right: -40px; top: -40px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(201,162,39,.16), transparent 60%); }
  .bk-title .crest-slot { width: 64px; height: 64px; border-radius: 50%; border: 2px dashed rgba(255,255,255,.35); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--d27-gold); flex-shrink: 0; }
  .bk-title .tt { position: relative; }
  .bk-title .eyebrow { color: var(--d27-gold); font-family: var(--font-display); letter-spacing: .14em; font-size: 12px; font-weight: 600; }
  .bk-title h1 { font-family: var(--font-display); font-size: clamp(26px, 4vw, 40px); margin: 2px 0 0; letter-spacing: -.01em; line-height: 1; color: #fff; }
  .bk-title .sub { color: rgba(255,255,255,.72); font-size: 13px; margin-top: 6px; }
  .bk-title .updated { margin-left: auto; position: relative; display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: #fff; background: rgba(16,185,129,.2); border: 1px solid rgba(16,185,129,.5); padding: 6px 13px; border-radius: 999px; font-weight: 600; }
  .bk-title .updated .dot { width: 7px; height: 7px; border-radius: 50%; background: #34D399; box-shadow: 0 0 0 0 rgba(52,211,153,.6); animation: bkPulse 1.7s infinite; }
  @keyframes bkPulse { 70% { box-shadow: 0 0 0 8px rgba(52,211,153,0); } }

  .bk-legend { display: flex; gap: 18px; flex-wrap: wrap; padding: 6px 2px 0; font-size: 12px; color: var(--muted); }
  .bk-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .bk-legend .chip { width: 20px; height: 4px; border-radius: 2px; }
  .bk-legend .w { background: var(--d27-navy); }
  .bk-legend .l { background: var(--d27-red); }
  .bk-legend .f { background: var(--d27-gold); }
  /* zoom + print controls */
  .bk-legend .bk-tools { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .bk-zoomctl { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--surface); }
  .bk-zoomctl button { background: none; border: none; width: 30px; height: 30px; font-size: 18px; line-height: 1; color: var(--d27-navy); cursor: pointer; }
  .bk-zoomctl button:hover { background: var(--d27-sub); }
  .bk-zoomctl span { min-width: 48px; text-align: center; font-size: 12px; font-weight: 700; color: var(--d27-navy); border-left: 1px solid var(--line); border-right: 1px solid var(--line); height: 30px; line-height: 30px; }
  .bk-tool-btn { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 0 13px; height: 30px; font-size: 12px; font-weight: 700; color: var(--d27-navy); cursor: pointer; font-family: var(--font-display); letter-spacing: .03em; text-transform: uppercase; }
  /* On phones the CSS-zoom controls break the scrollable bracket — hide them; pinch-zoom + scroll instead. */
  @media (max-width: 700px) { .bk-zoomctl, #zoomFit, #printBracket { display: none; } }
  .bk-tool-btn:hover { background: var(--d27-navy); color: #fff; }
  @media print {
    @page { size: landscape; margin: 0.4in; }
    body { background: #fff !important; }
    #d27-nav, #d27-footer, .nav, .footer, .bk-bar, .bk-note, .bk-tools, .ls-teams { display: none !important; }
    .bk-scroll { overflow: visible !important; }
    main.container { max-width: none !important; padding: 0 !important; }
  }

  /* Champion banner */
  .bk-champion { background: linear-gradient(120deg, #C9A227, #EBCB5E 45%, #C9A227); color: var(--d27-navy); border-radius: 14px; padding: 24px 30px; margin: 20px 0 10px; display: flex; align-items: center; gap: 22px; box-shadow: 0 10px 34px rgba(201,162,39,.45); position: relative; overflow: hidden; animation: champShine 3s ease-in-out infinite; }
  @keyframes champShine { 50% { box-shadow: 0 10px 44px rgba(201,162,39,.7); } }
  .bk-champion::after { content: ''; position: absolute; right: -30px; top: -40px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,.4), transparent 60%); pointer-events: none; }
  .bk-champion .trophy { font-size: 60px; line-height: 1; position: relative; }
  .bk-champion .ct { position: relative; }
  .bk-champion .ct .lbl { font-family: var(--font-display); letter-spacing: .2em; font-size: 13px; font-weight: 700; text-transform: uppercase; opacity: .85; }
  .bk-champion .ct .team { font-family: var(--font-display); font-size: clamp(30px, 6vw, 58px); font-weight: 700; line-height: 1; letter-spacing: -.01em; margin-top: 2px; }
  .bk-champion .ct .word { font-family: var(--font-display); font-size: clamp(18px, 3vw, 26px); font-weight: 700; letter-spacing: .12em; }

  /* Neon light traveling around the champion banner (SVG stroke-dashoffset comet) */
  .bk-champion .bk-neon { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 14px; pointer-events: none; z-index: 1; overflow: visible; }
  .bk-champion .trophy, .bk-champion .bk-trophy-img, .bk-champion .ct { z-index: 2; }
  .bk-champion .bk-neon .bk-neon-rail { fill: none; stroke: rgba(0,45,114,.16); stroke-width: 1; }
  .bk-champion .bk-neon .bk-neon-glow { fill: none; stroke: #EBCB5E; stroke-width: 3.4; stroke-linecap: round; stroke-dasharray: 60 540; filter: url(#bkNeonBlur); opacity: .85; animation: bkNeonTravel 4.4s linear infinite; }
  .bk-champion .bk-neon .bk-neon-core { fill: none; stroke: #F4FBFF; stroke-width: 1.6; stroke-linecap: round; stroke-dasharray: 38 562; animation: bkNeonTravel 4.4s linear infinite; filter: drop-shadow(0 0 3px #8FE9FF) drop-shadow(0 0 6px rgba(143,233,255,.6)); }
  @keyframes bkNeonTravel { to { stroke-dashoffset: -600; } }
  .bk-champion .bk-trophy-img { width: 62px; height: 62px; object-fit: contain; display: block; position: relative; flex: none; filter: drop-shadow(0 2px 4px rgba(0,45,114,.35)); }
  .bk-champion .ct .tourn { font-family: var(--font-display); letter-spacing: .14em; font-size: 14px; font-weight: 700; text-transform: uppercase; opacity: .92; margin-bottom: 2px; }
  @media (prefers-reduced-motion: reduce) {
    .bk-champion { animation: none; }
    .bk-champion .bk-neon .bk-neon-glow, .bk-champion .bk-neon .bk-neon-core { animation: none; stroke-dasharray: none; stroke-dashoffset: 0; }
    .bk-champion .bk-neon .bk-neon-glow { opacity: .5; }
    .bk-champion .bk-neon .bk-neon-core { opacity: .8; }
  }

  /* Teams & Fields panel (collapsible roster + home fields) */
  .ls-teams { border: 1px solid #e5e7eb; border-radius: 10px; margin: 18px 0 6px; background: #fff; overflow: hidden; }
  .ls-teams > summary { cursor: pointer; padding: 12px 16px; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--d27-navy); list-style: none; display: flex; align-items: center; gap: 8px; user-select: none; }
  .ls-teams > summary::-webkit-details-marker { display: none; }
  .ls-teams > summary:hover { background: #f8fafc; }
  .ls-teams .chev { display: inline-block; transition: transform .2s ease; color: var(--d27-gold); font-size: 12px; }
  .ls-teams[open] > summary .chev { transform: rotate(90deg); }
  .ls-teams .cnt { color: #6b7280; font-weight: 600; font-size: 12px; }
  .ls-teams-wrap { padding: 8px 14px 12px; border-top: 1px solid #f1f5f9; }
  .ls-teams-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 36px; }
  @media (max-width: 720px) { .ls-teams-cols { grid-template-columns: 1fr; } }
  .ls-teams-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .ls-teams-table td { padding: 8px 8px; border-bottom: 1px solid #f3f5f8; vertical-align: middle; }
  .ls-teams-table tr:last-child td { border-bottom: none; }
  .ls-teams-table tr:hover td { background: #f8fafc; }
  .ls-teams-table .ts { width: 24px; text-align: center; color: #b0bac8; font-weight: 700; font-size: 12px; }
  .ls-teams-table .tn { font-weight: 700; color: #1f2937; white-space: normal; overflow-wrap: break-word; word-break: normal; line-height: 1.2; }
  .ls-teams-table .tn .d27-logo, .ls-teams-table .tn .d27-logo-fb { vertical-align: middle; margin-right: 2px; }
  .ls-teams-table .tac { width: 1px; white-space: nowrap; }
  .ls-teams-table .ta { font-size: 10.5px; color: #475569; font-weight: 700; background: #eef2f7; padding: 2px 7px; border-radius: 4px; letter-spacing: .04em; }
  .ls-teams-table .tp { color: #5b6675; width: 99%; white-space: normal; overflow-wrap: break-word; padding-left: 14px; }
  .ls-teams-table .tp .pin { opacity: .6; margin-right: 4px; font-size: 11px; }
  .ls-teams-table .muted { color: #cbd5e1; }

  /* Section label (Winners / Losers / Final) */
  .bk-sec-label { font-family: var(--font-display); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600; margin: 26px 0 2px; padding-left: 12px; border-left: 4px solid var(--d27-navy); }
  .bk-sec-label.l { border-left-color: var(--d27-red); }
  .bk-sec-label.f { border-left-color: var(--d27-gold); }

  /* Bracket canvas (absolute-positioned cards + SVG connectors) */
  .bk-scroll { overflow-x: auto; overflow-y: hidden; padding: 14px 0 26px; }
  .bk-canvas { position: relative; }
  .bk-canvas svg { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  .bk-region { position: absolute; font-family: var(--font-display); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700; padding-left: 10px; border-left: 4px solid var(--d27-navy); white-space: nowrap; }
  .bk-region.w { color: var(--d27-navy); border-left-color: var(--d27-navy); }
  .bk-region.l { color: var(--d27-red); border-left-color: var(--d27-red); }
  .bk-region.f { color: #9a7b15; border-left-color: var(--d27-gold); }

  .bk-match { position: absolute; width: 210px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.05); overflow: hidden; transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease; z-index: 2; }
  .bk-match:hover { box-shadow: 0 0 0 3px rgba(0,120,255,.32), 0 10px 26px rgba(0,80,200,.30), 0 0 34px rgba(0,120,255,.42); border-color: #0070f3; transform: translateY(-3px); z-index: 6; }
  .bk-match.acc-w { border-left: 3px solid var(--d27-navy); }
  .bk-match.acc-l { border-left: 3px solid var(--d27-red); }

  /* Championship card — gold, glowing, trophy header */
  .bk-match.acc-f { border: 1.5px solid var(--d27-gold); background: linear-gradient(180deg, #FFFBEC, var(--surface) 60%); animation: champGlow 2.6s ease-in-out infinite; }
  @keyframes champGlow {
    0%, 100% { box-shadow: 0 0 0 2px rgba(201,162,39,.30), 0 8px 22px rgba(201,162,39,.20); }
    50%      { box-shadow: 0 0 0 2px rgba(201,162,39,.55), 0 10px 30px rgba(201,162,39,.42); }
  }
  .bk-match.acc-f:hover { animation: none; } /* let the blue hover glow take over */
  .bk-match.acc-f .bk-mtop { background: linear-gradient(90deg, var(--d27-gold), #E2B53C); border-bottom-color: rgba(201,162,39,.5); }
  .bk-match.acc-f .bk-mtop .g { color: var(--d27-navy); }
  .bk-match.acc-f .bk-mtop .tag.f { background: var(--d27-navy); color: var(--d27-gold); }

  .bk-mtop { display: flex; align-items: center; justify-content: space-between; height: 24px; box-sizing: border-box; padding: 0 10px; background: rgba(0,45,114,.035); border-bottom: 1px solid var(--line); }
  .bk-mtop .g { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--d27-navy); letter-spacing: .04em; }
  .bk-mtop .tag { font-size: 8px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
  .bk-mtop .tag.w { background: rgba(0,45,114,.1); color: var(--d27-navy); }
  .bk-mtop .tag.l { background: rgba(218,41,28,.1); color: var(--d27-red); }
  .bk-mtop .tag.f { background: rgba(201,162,39,.22); color: #8a6d10; }

  .bk-side { display: flex; align-items: center; gap: 8px; padding: 0 10px; height: 35px; box-sizing: border-box; }
  .bk-side + .bk-side { border-top: 1px solid var(--line); }
  .bk-side .nm { flex: 1; min-width: 0; font-weight: 700; font-size: 13px; color: var(--d27-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-side .nm .via { font-size: 10px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .bk-side.tbd .nm { color: var(--muted); font-weight: 600; font-style: italic; }
  .bk-side.bye .nm { color: var(--muted); }
  .bk-side .sc { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--muted); min-width: 18px; text-align: center; }
  .bk-side.win .nm { color: #047857; }
  .bk-side.win .sc { color: #047857; }

  .bk-mfoot { height: 40px; box-sizing: border-box; padding: 3px 10px; font-size: 10px; color: var(--muted); border-top: 1px dashed var(--line); display: flex; flex-direction: column; justify-content: center; gap: 1px; }
  .bk-mfoot .fin { color: #047857; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .bk-when { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .bk-frow { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .bk-field { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

  .bk-empty, .bk-loading { text-align: center; color: var(--muted); padding: 60px; font-family: var(--font-display); letter-spacing: .06em; text-transform: uppercase; }
  .bk-note { background: linear-gradient(90deg, rgba(201,162,39,.06), rgba(0,45,114,.04)); border: 1px solid rgba(0,45,114,.12); border-left: 4px solid var(--d27-gold); border-radius: 6px; padding: 13px 18px; margin: 18px 0 0; font-size: 13px; color: var(--muted); }
  .bk-note b { color: var(--d27-navy); }
</style>

<body>

<div id="d27-nav"></div>

<div class="bk-bar">
  <div class="container">
    <div class="bk-bar-top">
      <span class="bk-bar-title">Choose a bracket</span>
    </div>
    <div class="bk-picker" id="tourneyPicker"></div>
  </div>
</div>

<main class="container">
  <div id="titleband"></div>
  <div class="bk-legend">
    <span><span class="chip w"></span> Winners bracket</span>
    <span><span class="chip l"></span> Losers bracket</span>
    <span><span class="chip f"></span> Championship</span>
    <div class="bk-tools">
      <a class="view-link" id="viewSchedLink" href="tournament-schedule.html">View as schedule →</a>
      <div class="bk-zoomctl">
        <button type="button" id="zoomOut" aria-label="Zoom out">−</button>
        <span id="zoomLabel">100%</span>
        <button type="button" id="zoomIn" aria-label="Zoom in">+</button>
      </div>
      <button type="button" class="bk-tool-btn" id="zoomFit">Fit</button>
      <button type="button" class="bk-tool-btn" id="printBracket">🖨 Print</button>
    </div>
  </div>
  <div class="bk-scroll"><div id="output"><div class="bk-loading">Loading brackets…</div></div></div>
  <div class="bk-note"><b>Live bracket.</b> When a score is entered, the winner advances automatically — “Winner of Game 5” becomes the actual team, and the line carries them to the next round.</div>
</main>

<div id="d27-footer"></div>

<script>
let DATA = null;
const CARD_W = 210, CARD_H = 137, COL_GAP = 76, ROW_GAP = 26, Y_PAD = 26;

// ── reference parsing + winner resolution ───────────────────────────
function parseRef(s) {
  if (s == null) return { kind: 'tbd' };
  const t = String(s).trim();
  let m = t.match(/^WG-(\d+)$/i); if (m) return { kind: 'WG', g: +m[1] };
  m = t.match(/^LG-(\d+)$/i);     if (m) return { kind: 'LG', g: +m[1] };
  if (/if necessary/i.test(t)) return { kind: 'tbd', label: 'If necessary' };
  if (/^bye$/i.test(t))        return { kind: 'bye' };
  return { kind: 'team', name: t };
}
const gameByNum = (t, n) => t.games.find(g => g.g === n);
const isPlayed = g => g && g.as != null && g.hs != null && (g.as + g.hs) > 0;
function resolveSide(t, ref, seen) {
  seen = seen || new Set();
  if (ref.kind === 'team') return ref.name;
  if (ref.kind === 'bye')  return 'BYE';
  if (ref.kind !== 'WG' && ref.kind !== 'LG') return null;
  const g = gameByNum(t, ref.g); if (!g || seen.has(ref.g)) return null;
  seen.add(ref.g);
  return ref.kind === 'WG' ? winnerName(t, g, seen) : loserName(t, g, seen);
}
function winnerName(t, g, seen) { if (!isPlayed(g)) return null; const a = resolveSide(t, parseRef(g.away), new Set(seen)), h = resolveSide(t, parseRef(g.home), new Set(seen)); return g.as > g.hs ? a : g.hs > g.as ? h : null; }
function loserName(t, g, seen)  { if (!isPlayed(g)) return null; const a = resolveSide(t, parseRef(g.away), new Set(seen)), h = resolveSide(t, parseRef(g.home), new Set(seen)); return g.as > g.hs ? h : g.hs > g.as ? a : null; }
function sideDisplay(t, raw) {
  const ref = parseRef(raw);
  if (ref.kind === 'team') return { name: ref.name };
  if (ref.kind === 'bye')  return { name: 'BYE', bye: true };
  if (ref.kind === 'tbd')  return { name: ref.label || 'TBD', tbd: true };
  const resolved = resolveSide(t, ref, new Set());
  if (resolved) return { name: resolved, via: 'G' + ref.g };
  return { name: (ref.kind === 'WG' ? 'Winner' : 'Loser') + ' G' + ref.g, tbd: true };
}

// A bye game ("Team vs BYE") auto-advances the non-bye side, but the data often
// records the game it advances INTO with that team's name (or LG-ref) instead of
// "WG-<bye>". That leaves nothing pointing at the bye game, so the layout treats
// it as a dead-end and parks it way off beside the final. Rewrite the first
// downstream slot that picks the advancer back up into "WG-<bye>" so the bye
// sits in round 1 and draws a line into the game it feeds — the way the Excel
// has it. Returns a fresh array; the source games are never mutated. No-op for
// brackets without byes (every slot is checked, none match).
function normalizeByes(games) {
  const isBye = s => /^\s*bye\s*$/i.test(s == null ? '' : String(s));
  const norm = games.map(g => ({ ...g }));
  for (const b of norm) {
    const aBye = isBye(b.away), hBye = isBye(b.home);
    if (aBye === hBye) continue;                       // not a single-sided bye
    const advancer = aBye ? b.home : b.away;           // the side that auto-advances
    if (advancer == null || isBye(advancer)) continue;
    const key = String(advancer).trim();
    const consumer = norm
      .filter(c => c.g > b.g && (String(c.away).trim() === key || String(c.home).trim() === key))
      .sort((x, y) => x.g - y.g)[0];                   // earliest game that picks it back up
    if (!consumer) continue;
    if (String(consumer.away).trim() === key) consumer.away = 'WG-' + b.g;
    else consumer.home = 'WG-' + b.g;
  }
  return norm;
}

// ── structure: feeders, rounds, bracket-class (W/L/F) ───────────────
function feeders(g) { const o = []; for (const raw of [g.away, g.home]) { const r = parseRef(raw); if (r.kind === 'WG' || r.kind === 'LG') o.push(r.g); } return o; }
function computeRounds(t) {
  const depth = {}, guard = new Set();
  function d(n) { if (depth[n] != null) return depth[n]; if (guard.has(n)) return 1; guard.add(n); const g = gameByNum(t, n); if (!g) return 1; const f = feeders(g); const r = f.length ? 1 + Math.max(...f.map(d)) : 1; depth[n] = r; return r; }
  t.games.forEach(g => d(g.g)); return depth;
}
function classify(t) {
  // Winners bracket = "pure winners": no LG anywhere in the game's lineage (both teams still unbeaten).
  const pw = {}, guard = new Set();
  function isPw(n) {
    if (pw[n] != null) return pw[n];
    if (guard.has(n)) return true; guard.add(n);
    const g = gameByNum(t, n); if (!g) { pw[n] = true; return true; }
    let v = true;
    for (const raw of [g.away, g.home]) {
      const r = parseRef(raw);
      if (r.kind === 'LG') v = false;
      if (r.kind === 'WG' && !isPw(r.g)) v = false;
    }
    pw[n] = v; return v;
  }
  t.games.forEach(g => isPw(g.g));

  // WB final = deepest pure-winners game (the last unbeaten-vs-unbeaten game)
  const depth = computeRounds(t);
  let wbFinal = null, wbDepth = -1;
  for (const g of t.games) if (pw[g.g] && (depth[g.g] || 1) > wbDepth) { wbDepth = depth[g.g] || 1; wbFinal = g.g; }

  // who references each game's winner/loser
  const consumers = {};
  for (const g of t.games) for (const raw of [g.away, g.home]) { const r = parseRef(raw); if (r.kind === 'WG' || r.kind === 'LG') (consumers[r.g] = consumers[r.g] || []).push(g.g); }

  // Grand final = the game(s) that consume the WB-final's winner (+ any "if necessary" follow-on)
  const fin = new Set();
  if (wbFinal != null) {
    let q = (consumers[wbFinal] || []).filter(n => {
      const g = gameByNum(t, n);
      const a = parseRef(g.away), h = parseRef(g.home);
      return (a.kind === 'WG' && a.g === wbFinal) || (h.kind === 'WG' && h.g === wbFinal);
    });
    while (q.length) { const n = q.shift(); if (fin.has(n)) continue; fin.add(n); (consumers[n] || []).forEach(c => q.push(c)); }
    if (!fin.size) fin.add(wbFinal); // WB final with no follow-on = the championship game (single-elimination)
  }

  const cls = {};
  for (const g of t.games) cls[g.g] = fin.has(g.g) ? 'f' : pw[g.g] ? 'w' : 'l';
  return cls;
}

// fixed card height (CSS locks each row's height) → exact geometry
function cardHeight(g) { return CARD_H; }

function matchHTML(t, g, cls, x, y) {
  const A = sideDisplay(t, g.away), H = sideDisplay(t, g.home);
  const played = isPlayed(g), aWin = played && g.as > g.hs, hWin = played && g.hs > g.as;
  const side = (s, sc, win) => `<div class="bk-side${win ? ' win' : ''}${s.tbd ? ' tbd' : ''}${s.bye ? ' bye' : ''}">${(!s.tbd && !s.bye && window.D27logos) ? D27logos.html(s.name, 20) : ''}<span class="nm">${s.name}${s.via ? `<span class="via">via ${s.via}</span>` : ''}</span><span class="sc">${sc != null ? sc : ''}</span></div>`;
  const tag = cls === 'f' ? '<span class="tag f">🏆 Final</span>' : cls === 'l' ? '<span class="tag l">Losers</span>' : '<span class="tag w">Winners</span>';
  const okStr = v => v && !/^(n\/?a|tbd|tba|none|-+)$/i.test(String(v).trim());
  const cd = okStr(g.date) ? new Date(g.date + 'T12:00:00') : null;
  const when = [(cd && !isNaN(cd)) ? cd.toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' }) : null, okStr(g.time) ? fmtTime(g.time) : null].filter(Boolean).join(' · ');
  const forfeit = played && (g.forfeit != null ? !!g.forfeit : (!okStr(g.date) && !/^bye$/i.test(String(g.away).trim()) && !/^bye$/i.test(String(g.home).trim())));
  const whenText = forfeit ? 'Forfeit' : (when || 'TBD');
  const field = okStr(g.field) ? String(g.field) : '';
  return `<div class="bk-match acc-${cls}" data-tkey="${t.key}" data-g="${g.g}" style="left:${x}px;top:${y}px"><div class="bk-mtop"><span class="g">Game ${g.g}</span>${tag}</div>${side(A, g.as, aWin)}${side(H, g.hs, hWin)}<div class="bk-mfoot"><div class="bk-when">${whenText}</div><div class="bk-frow"><span class="bk-field">${field ? '📍 ' + field : ''}</span><span class="gm-cue ${played ? 'recap' : 'preview'}">${played ? 'Recap' : 'Preview'} ›</span></div></div></div>`;
}
function fmtTime(t) { let [h, m] = t.split(':').map(Number); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${String(m).padStart(2,'0')} ${ap}`; }

// depth within a subset — feeders only count if also in the subset
function depthInSubset(t, games) {
  const inSet = new Set(games.map(g => g.g));
  const depth = {}, guard = new Set();
  function d(n) {
    if (depth[n] != null) return depth[n];
    if (guard.has(n)) return 1; guard.add(n);
    const g = gameByNum(t, n); if (!g) return 1;
    const f = feeders(g).filter(x => inSet.has(x));
    const r = f.length ? 1 + Math.max(...f.map(d)) : 1;
    depth[n] = r; return r;
  }
  games.forEach(g => d(g.g)); return depth;
}

// columns by distance to the section's FINAL game — so a play-in game (whose
// winner feeds a round-1 game) sits in its own column BEFORE round 1, and each
// round lines up cleanly, the way the Excel bracket reads.
function colsFromEnd(t, games) {
  const inSet = new Set(games.map(g => g.g));
  const consumer = {};
  for (const c of games) for (const raw of [c.away, c.home]) { const r = parseRef(raw); if (r.kind === 'WG' && inSet.has(r.g)) consumer[r.g] = c.g; }
  const rank = {}, guard = new Set();
  function rk(n) { if (rank[n] != null) return rank[n]; if (guard.has(n)) return 0; guard.add(n); const c = consumer[n]; rank[n] = (c != null && inSet.has(c)) ? 1 + rk(c) : 0; return rank[n]; }
  games.forEach(g => rk(g.g));
  const maxRank = Math.max(0, ...games.map(g => rank[g.g] || 0));
  const col = {};
  games.forEach(g => { col[g.g] = maxRank - (rank[g.g] || 0) + 1; });
  return col;
}

// render one section (Winners / Losers / Final) as its own clean tree
// Lay out ONE bracket (winners or losers) into { gameNum: {x,y,h,col} }.
//   COLUMNS (x): distance-to-final — play-ins land in their own column before
//   round 1, and the two games that feed a given game always share a column.
//   ROWS (y): walk the tree from the final backward — round-1 games + play-ins
//   are leaves that stack top→bottom in feed order; every later game centers
//   between its two feeders. Origin is (0, Y_PAD); the caller offsets as needed.
function layoutSection(t, games) {
  const inSet = new Set(games.map(g => g.g));
  const depth = colsFromEnd(t, games);
  const SLOT = CARD_H + ROW_GAP;
  const kidsOf = n => {                      // in-section feeders, away(top) → home(bottom)
    const g = gameByNum(t, n); if (!g) return [];
    const ks = [];
    for (const raw of [g.away, g.home]) { const r = parseRef(raw); if ((r.kind === 'WG' || r.kind === 'LG') && inSet.has(r.g)) ks.push(r.g); }
    return ks;
  };
  const consumed = new Set();
  for (const g of games) for (const k of kidsOf(g.g)) consumed.add(k);
  const roots = games.map(g => g.g).filter(n => !consumed.has(n)).sort((a, b) => a - b);

  const cen = {}; let leaf = 0; const guard = new Set();
  function place(n) {
    if (cen[n] != null) return cen[n];
    if (guard.has(n)) return (cen[n] = Y_PAD + (leaf++) * SLOT + CARD_H / 2); // cycle guard
    guard.add(n);
    const ks = kidsOf(n);
    const c = ks.length
      ? (() => { const cs = ks.map(place); return (Math.min(...cs) + Math.max(...cs)) / 2; })()
      : Y_PAD + (leaf++) * SLOT + CARD_H / 2;
    return (cen[n] = c);
  }
  roots.forEach(place);
  games.forEach(g => { if (cen[g.g] == null) place(g.g); }); // any stragglers

  const pos = {};
  for (const g of games) pos[g.g] = { x: ((depth[g.g] || 1) - 1) * (CARD_W + COL_GAP), y: cen[g.g] - CARD_H / 2, h: CARD_H, col: depth[g.g] || 1 };

  // safety net: if two cards in a column overlap, push the lower ones down.
  const byCol = {};
  for (const g of games) { const r = depth[g.g] || 1; (byCol[r] = byCol[r] || []).push(g.g); }
  for (const r in byCol) {
    const list = byCol[r].sort((a, b) => pos[a].y - pos[b].y);
    for (let i = 1; i < list.length; i++) {
      const minY = pos[list[i - 1]].y + pos[list[i - 1]].h + ROW_GAP;
      if (pos[list[i]].y < minY) pos[list[i]].y = minY;
    }
  }
  return pos;
}

// Draw the WHOLE bracket on one canvas the way the Excel does it: winners
// bracket on top, losers bracket directly below, and the Championship to the
// RIGHT of both — fed by the winners final (from the top) and the losers final
// (from the bottom). That convergence is the whole point: it shows the losers
// bracket leads to the same final the winners bracket does.
function combinedCanvas(t, cls, visible) {
  const REGION_GAP = 64;                         // vertical breathing room between the two brackets
  const W = visible.filter(g => cls[g.g] === 'w');
  const L = visible.filter(g => cls[g.g] === 'l');
  const F = visible.filter(g => cls[g.g] === 'f').sort((a, b) => a.g - b.g);

  const pos = {};
  const posW = layoutSection(t, W);
  let winnersH = 0, winnersMaxCol = 0;
  for (const k in posW) { pos[k] = posW[k]; winnersH = Math.max(winnersH, posW[k].y + posW[k].h); winnersMaxCol = Math.max(winnersMaxCol, posW[k].col); }

  const losersOffsetY = winnersH + REGION_GAP;
  let losersMaxCol = 0;
  if (L.length) {
    const posL = layoutSection(t, L);
    // Align the losers bracket under the winners game whose loser feeds its first round: a first-round
    // losers game that takes the loser of a winners game in column C lands at column C — so e.g. a
    // 3-team bracket's single losers game sits under Game 2 instead of orphaned at the far left.
    const wcol = {}; for (const g of W) wcol[g.g] = posW[g.g].col;
    const Lset = new Set(L.map(g => g.g));
    let offCol = 0;
    for (const g of L) {
      let wMax = 0, hasL = false;
      for (const raw of [g.away, g.home]) {
        const r = parseRef(raw);
        if (r.kind === 'WG' || r.kind === 'LG') {
          if (Lset.has(r.g)) hasL = true;                                  // fed by another losers game
          else if (r.kind === 'LG' && wcol[r.g] != null) wMax = Math.max(wMax, wcol[r.g]); // takes a winners loser
        }
      }
      if (wMax && !hasL) offCol = Math.max(offCol, wMax - posL[g.g].col);  // first-round losers game
    }
    const dx = Math.max(0, offCol) * (CARD_W + COL_GAP);
    for (const k in posL) { pos[k] = { x: posL[k].x + dx, y: posL[k].y + losersOffsetY, h: posL[k].h, col: posL[k].col + offCol }; losersMaxCol = Math.max(losersMaxCol, posL[k].col + offCol); }
  }

  // Championship column(s): to the right of BOTH brackets. Each final game
  // centers vertically between its feeders (winners final on top, losers final
  // below), so the two gold lines visibly converge into it.
  let fcol = Math.max(winnersMaxCol, losersMaxCol) + 1;
  for (const g of F) {
    const fc = feeders(g).map(n => pos[n]).filter(Boolean).map(p => p.y + p.h / 2);
    const cy = fc.length ? (Math.min(...fc) + Math.max(...fc)) / 2 : losersOffsetY / 2 + Y_PAD;
    pos[g.g] = { x: (fcol - 1) * (CARD_W + COL_GAP), y: cy - CARD_H / 2, h: CARD_H, col: fcol };
    fcol++;
  }

  let maxX = 0, maxY = 0;
  for (const k in pos) { maxX = Math.max(maxX, pos[k].x + CARD_W); maxY = Math.max(maxY, pos[k].y + pos[k].h); }

  // Connectors follow ONLY "winner advances" (WG-) references — never "loser
  // drops" (LG-). That draws every advancement line, INCLUDING the winners
  // final → championship and losers final → championship feeds, while leaving
  // out the loser drop-ins that would otherwise turn into spaghetti.
  const wgFeeders = g => { const o = []; for (const raw of [g.away, g.home]) { const r = parseRef(raw); if (r.kind === 'WG') o.push(r.g); } return o; };
  const lineColor = k => k === 'f' ? '#C9A227' : k === 'l' ? 'rgba(218,41,28,.55)' : 'rgba(0,45,114,.5)';
  let paths = '';
  for (const g of visible) {
    const p = pos[g.g]; if (!p) continue;
    for (const fn of wgFeeders(g)) {
      const fp = pos[fn]; if (!fp) continue;
      const x1 = fp.x + CARD_W, y1 = fp.y + fp.h / 2, x2 = p.x, y2 = p.y + p.h / 2, mx = x1 + (x2 - x1) / 2;
      const sw = cls[g.g] === 'f' ? 2.5 : 2;
      paths += `<path d="M${x1},${y1} H${mx} V${y2} H${x2}" fill="none" stroke="${lineColor(cls[g.g])}" stroke-width="${sw}"/>`;
    }
  }

  let cards = '';
  for (const g of visible) { const p = pos[g.g]; if (p) cards += matchHTML(t, g, cls[g.g], p.x, p.y); }

  // floating region labels (only meaningful when there's a losers bracket)
  let labels = '';
  if (L.length) {
    labels += `<div class="bk-region w" style="left:0;top:2px">Winners Bracket</div>`;
    labels += `<div class="bk-region l" style="left:0;top:${losersOffsetY - 20}px">Losers Bracket</div>`;
    if (F.length) { const fp = pos[F[0].g]; if (fp) labels += `<div class="bk-region f" style="left:${fp.x}px;top:${fp.y - 22}px">Championship</div>`; }
  }

  const H = maxY + Y_PAD;
  return `<div class="bk-scroll"><div class="bk-canvas" style="width:${maxX}px;height:${H}px">
    <svg width="${maxX}" height="${H}">${paths}</svg>${labels}${cards}</div></div>`;
}

// Double-elim outcome: who's champion, and which "if necessary" games to hide.
// Grand final = lowest 'f' game. The winners-bracket champion (the side fed by a
// 'w' game) only has to win it once — if they do, the if-necessary game(s) are
// never played, so we hide them and crown the champion.
function championOutcome(t, cls) {
  const finals = t.games.filter(g => cls[g.g] === 'f').sort((a, b) => a.g - b.g);
  const hide = new Set();
  if (!finals.length) return { champion: null, hide };
  const gf = finals[0];
  const feederCls = raw => { const r = parseRef(raw); return (r.kind === 'WG' || r.kind === 'LG') ? cls[r.g] : null; };
  const winnersSide = feederCls(gf.away) === 'w' ? 'away' : feederCls(gf.home) === 'w' ? 'home' : 'away';
  // Single-elim final (no losers-bracket finalist on either side) is won outright.
  const isGrandFinal = feederCls(gf.away) === 'l' || feederCls(gf.home) === 'l';
  let champion = null;
  if (isPlayed(gf)) {
    const winSide = gf.as > gf.hs ? 'away' : gf.hs > gf.as ? 'home' : null;
    if (winSide && (!isGrandFinal || winSide === winnersSide)) {
      // winners-bracket champ won → tournament over, if-necessary not played
      champion = resolveSide(t, parseRef(winSide === 'away' ? gf.away : gf.home), new Set());
      finals.slice(1).forEach(g => hide.add(g.g));
    } else if (winSide) {
      // losers champ forced a deciding game → champion is whoever wins that
      const dec = finals[1];
      if (dec && isPlayed(dec)) {
        const ds = dec.as > dec.hs ? 'away' : dec.hs > dec.as ? 'home' : null;
        if (ds) champion = resolveSide(t, parseRef(ds === 'away' ? dec.away : dec.home), new Set());
      }
    }
  }
  return { champion, hide };
}

// roster + home-field table for a tournament (from the Excel team table)
function teamsPanelHTML(t, open) {
  const teams = (t.teams || []).slice().sort((a, b) => (a.n || 0) - (b.n || 0));
  if (!teams.length) return '';
  const mkTable = list => `<table class="ls-teams-table"><tbody>${list.map(tm => `
        <tr>
          <td class="ts">${tm.n || ''}</td>
          <td class="tn">${window.D27logos ? D27logos.html(tm.name, 22) : ''} ${tm.name}</td>
          <td class="tac"><span class="ta">${tm.abbr || ''}</span></td>
          <td class="tp">${tm.park ? `<span class="pin">📍</span>${tm.park}` : '<span class="muted">—</span>'}</td>
        </tr>`).join('')}</tbody></table>`;
  const half = Math.ceil(teams.length / 2);
  const body = teams.length > 6
    ? `<div class="ls-teams-cols">${mkTable(teams.slice(0, half))}${mkTable(teams.slice(half))}</div>`
    : mkTable(teams);
  return `<details class="ls-teams"${open ? ' open' : ''}>
      <summary><span class="chev">▸</span> Teams &amp; Fields <span class="cnt">${teams.length} teams</span></summary>
      <div class="ls-teams-wrap">${body}</div>
    </details>`;
}

// ── zoom + print controls ───────────────────────────────────────────
let BK_ZOOM = 1;
function applyBkZoom() {
  const z = document.getElementById('bkZoom'); if (z) z.style.zoom = BK_ZOOM;
  const lbl = document.getElementById('zoomLabel'); if (lbl) lbl.textContent = Math.round(BK_ZOOM * 100) + '%';
}
function bkZoomBy(d) { BK_ZOOM = Math.min(1.4, Math.max(0.3, Math.round((BK_ZOOM + d) * 10) / 10)); applyBkZoom(); }
function bkFit() {
  const z = document.getElementById('bkZoom'); if (!z) return;
  z.style.zoom = '1';
  let maxW = 0; z.querySelectorAll('.bk-canvas').forEach(c => { maxW = Math.max(maxW, c.offsetWidth); });
  const main = document.querySelector('main.container');
  const avail = (main ? main.clientWidth : window.innerWidth) - 6;
  BK_ZOOM = maxW > 0 ? Math.round(Math.max(0.3, Math.min(1, avail / maxW)) * 100) / 100 : 1;
  applyBkZoom();
}
function printBracket() {
  const out = document.getElementById('output'), z = document.getElementById('bkZoom');
  const teams = out.querySelector('.ls-teams');
  const prevZ = z ? z.style.zoom : '', prevTeams = teams ? teams.style.display : '';
  if (z) z.style.zoom = '1';
  if (teams) teams.style.display = 'none';            // teams panel is hidden in print — exclude from measure
  let maxW = 0; out.querySelectorAll('.bk-canvas').forEach(c => { maxW = Math.max(maxW, c.offsetWidth); });
  const contentW = maxW || out.scrollWidth, contentH = out.scrollHeight;
  if (teams) teams.style.display = prevTeams;
  // landscape Letter printable area at 96dpi, ~0.4in margins (conservative so it never spills to page 2)
  const fit = Math.min(930 / contentW, 690 / contentH, 1);
  document.body.classList.add('printing');
  out.style.zoom = fit;
  const restore = () => { out.style.zoom = ''; if (z) z.style.zoom = prevZ; document.body.classList.remove('printing'); };
  window.addEventListener('afterprint', restore, { once: true });
  setTimeout(() => window.print(), 120);
}
(function () {
  const wire = (id, fn) => { const el = document.getElementById(id); if (el) el.addEventListener('click', fn); };
  wire('zoomIn', () => bkZoomBy(0.1));
  wire('zoomOut', () => bkZoomBy(-0.1));
  wire('zoomFit', bkFit);
  wire('printBracket', printBracket);
})();

function renderBracket(t) {
  const out = document.getElementById('output');
  if (!t.games.length) { out.innerHTML = teamsPanelHTML(t, false) + '<div class="bk-empty">No games yet for this tournament.</div>'; renderTitle(t); return; }
  // wire bye games up to whatever they feed (a fresh copy — source untouched),
  // then classify + lay out from that. Title/teams panel still use the original.
  const tn = { ...t, games: normalizeByes(t.games) };
  const cls = classify(tn);
  const outcome = championOutcome(tn, cls);
  const visible = tn.games.filter(g => !outcome.hide.has(g.g));

  let html = '';
  if (outcome.champion) {
    html += `<div class="bk-champion">` +
      `<svg class="bk-neon" viewBox="0 0 1000 200" preserveAspectRatio="none" aria-hidden="true" focusable="false">` +
        `<defs><filter id="bkNeonBlur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter></defs>` +
        `<rect class="bk-neon-rail" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>` +
        `<rect class="bk-neon-glow" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>` +
        `<rect class="bk-neon-core" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>` +
      `</svg>` +
      `<img class="bk-trophy-img" src="assets/d27-trophy.png" alt="champion trophy" onerror="this.onerror=null;this.outerHTML='<span class=&quot;trophy&quot;>🏆</span>'">` +
      `<div class="ct">` +
        `<div class="tourn">${escTxt(t.name)}</div>` +
        `<div class="lbl">★ Tournament Champion ★</div>` +
        `<div class="team">${escTxt(outcome.champion)}</div>` +
        `<div class="word">Champion</div>` +
      `</div>` +
    `</div>`;
  }
  html += teamsPanelHTML(t, false);
  html += '<div class="bk-zoomable" id="bkZoom">';
  html += combinedCanvas(tn, cls, visible);
  html += '</div>';
  out.innerHTML = html || '<div class="bk-empty">No bracket games.</div>';
  renderTitle(t);
  applyBkZoom();
}

function renderTitle(t) {
  const initials = t.key.replace(/[^A-Za-z0-9]/g, '').slice(0, 4).toUpperCase();
  const elim = (t.games || []).some(g => /^LG-/i.test(String(g.away || '')) || /^LG-/i.test(String(g.home || ''))) ? 'Double-elimination' : 'Single-elimination';
  document.getElementById('titleband').innerHTML = `
    <div class="bk-title">
      <div class="crest-slot">${initials}</div>
      <div class="tt">
        <div class="eyebrow">${(t.category || '').toUpperCase()}</div>
        <h1>${t.name}</h1>
        <div class="sub">${t.sport} · ${elim} · ${t.games.length} game${t.games.length === 1 ? '' : 's'}</div>
      </div>
      ${t.updated ? `<span class="updated"><span class="dot"></span>${updatedLabel(t.updated)}</span>` : ''}
    </div>`;
}
function updatedLabel(iso) {
  if (!iso) return '';
  const dateOnly = iso.length <= 10;
  const d = new Date(iso + (dateOnly ? 'T12:00:00' : ''));
  const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  if (dateOnly) return 'Updated ' + date;
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return `Updated ${date} · ${time}`;
}

function escTxt(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function scrollToBracket() {
  const el = document.getElementById('titleband'); if (!el) return;
  const nav = document.querySelector('.nav'); const navH = nav ? nav.offsetHeight : 80;
  const y = el.getBoundingClientRect().top + window.scrollY - navH - 12;
  if (y > window.scrollY + 4) window.scrollTo({ top: y, behavior: 'smooth' });
}
function selectTourney(key, scroll) {
  const t = DATA.tournaments.find(x => x.key === key) || DATA.tournaments[0];
  if (!t) return;
  renderBracket(t);
  location.hash = t.key;
  document.querySelectorAll('.bk-chip').forEach(c => c.classList.toggle('active', c.dataset.key === t.key));
  const vl = document.getElementById('viewSchedLink');
  if (vl) vl.href = 'tournament-schedule.html#' + encodeURIComponent(t.key);
  if (scroll) scrollToBracket();
}
function initSelect() {
  const picker = document.getElementById('tourneyPicker');
  const byCat = {}; for (const t of DATA.tournaments) (byCat[t.category] = byCat[t.category] || []).push(t);
  const cats = (DATA.categoryOrder || []).slice();
  for (const c in byCat) if (cats.indexOf(c) === -1) cats.push(c);
  let html = '';
  for (const cat of cats) {
    if (!byCat[cat]) continue;
    html += '<div class="bk-cat"><span class="bk-cat-label">' + escTxt(cat) + '</span><div class="bk-chips">';
    for (const t of byCat[cat]) html += '<button type="button" class="bk-chip" data-key="' + escTxt(t.key) + '">' + escTxt(t.name) + '</button>';
    html += '</div></div>';
  }
  picker.innerHTML = html;
  picker.querySelectorAll('.bk-chip').forEach(function (c) { c.addEventListener('click', function () { selectTourney(c.dataset.key, true); }); });
  const deep = new URLSearchParams(location.search).get('t') || location.hash.replace('#', '');
  const found = DATA.tournaments.find(t => t.key === (deep || 'BB-12')) || DATA.tournaments[0];
  if (found) { selectTourney(found.key, false); if (deep) setTimeout(scrollToBracket, 180); }
}

D27loadSchedules().then(d => { DATA = d; D27gameModal.setData(d.tournaments); initSelect(); })
  .catch(() => { document.getElementById('output').innerHTML = '<div class="bk-empty">Could not load bracket data.</div>'; });
// click any game card → preview (not started) or recap (final)
document.getElementById('output').addEventListener('click', e => {
  const card = e.target.closest('.bk-match[data-g]');
  if (card) D27gameModal.openByKey(card.dataset.tkey, card.dataset.g);
});
</script>
