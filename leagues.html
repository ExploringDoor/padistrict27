<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Member Leagues &amp; Fields · PA District 27 Little League</title>
<meta name="description" content="PA District 27's chartered Little Leagues across Chester, Delaware, and Montgomery counties — each league's home fields, addresses, and website." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css" />

<style>
  .hub-hero { background: linear-gradient(100deg, rgba(0,27,71,.95) 0%, rgba(0,27,71,.8) 46%, rgba(0,27,71,.5) 100%), url('assets/d27-pennants-hero.jpg') center/cover no-repeat; background-color: var(--d27-navy); color: var(--d27-white); padding: var(--space-7) 0 var(--space-6); }
  .hub-hero .crumb { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: var(--space-3); }
  .hub-hero .crumb a { color: rgba(255,255,255,.6); text-decoration: none; }
  .hub-hero h1 { color: var(--d27-white); font-size: clamp(2.25rem, 4vw, var(--text-4xl)); margin-bottom: var(--space-3); }
  .hub-hero p { color: rgba(255,255,255,.82); font-size: var(--text-lg); max-width: 62ch; }

  .lg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: var(--space-4); }
  .lg-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
  .lg-card:hover { transform: translateY(-5px); box-shadow: 0 16px 38px rgba(0,23,60,.18); border-color: var(--d27-navy); }
  .lg-head { padding: var(--space-4); background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); border-bottom: 2px solid var(--d27-navy); }
  .lg-head h2 { color: var(--d27-navy); margin: 0; font-size: var(--text-lg); line-height: 1.15; }
  .lg-title { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .lg-logo { display: inline-flex; flex: none; }
  .lg-visit { flex-shrink: 0; font-family: 'Oswald', sans-serif; font-size: var(--text-xs); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; text-decoration: none; color: var(--d27-navy); background: var(--gold); padding: 6px 12px; border-radius: 5px; white-space: nowrap; transition: filter .12s ease; }
  .lg-visit:hover { filter: brightness(1.08); text-decoration: none; }
  .lg-body { padding: var(--space-4); flex: 1; }
  .lg-fields-label { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: var(--space-2); }
  .lg-field { display: flex; gap: 8px; padding: 7px 0; border-top: 1px solid var(--line); }
  .lg-field:first-of-type { border-top: none; }
  .lg-field .pin { color: var(--d27-red); flex-shrink: 0; }
  .lg-field .fn { font-weight: 600; color: var(--d27-ink); font-size: var(--text-sm); }
  .lg-field .fuse { display: inline-block; font-family: 'Oswald', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--d27-navy); background: rgba(0,45,114,.08); border: 1px solid rgba(0,45,114,.18); border-radius: 3px; padding: 1px 5px; vertical-align: middle; margin-left: 4px; }
  .lg-field .fa { color: var(--muted); font-size: var(--text-xs); }
  .lg-field a.map { color: var(--accent); text-decoration: none; }
  .lg-field a.map:hover { text-decoration: underline; }
  .lg-nofield { color: var(--muted); font-size: var(--text-sm); }
  .hub-loading { padding: var(--space-6); text-align: center; color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: .04em; }
</style>
</head>
<body>

<div id="d27-nav"></div>

<header class="hub-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Leagues</div>
    <h1>Member Leagues &amp; Fields</h1>
    <p>District 27's chartered Little Leagues across Chester, Delaware, and Montgomery counties. Each league's home fields and website are below — tap an address for directions.</p>
  </div>
</header>

<main class="container section-tight">
  <div class="lg-grid" id="leagues"><div class="hub-loading">Loading leagues…</div></div>
</main>

<div id="d27-footer"></div>

<script src="js/d27-logos.js"></script>
<script src="js/d27-chrome.js"></script>
<script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function fieldHTML(f){
    var maps = 'https://maps.google.com/?q=' + encodeURIComponent(f.address || f.name);
    return '<div class="lg-field"><span class="pin">📍</span><div>' +
      '<div class="fn">' + esc(f.name) + (f.note ? ' <span class="fuse">' + esc(f.note) + '</span>' : '') + '</div>' +
      (f.address ? '<div class="fa"><a class="map" href="' + maps + '" target="_blank" rel="noopener">' + esc(f.address) + '</a></div>' : '') +
    '</div></div>';
  }
  function leagueHTML(l){
    var fields = (l.fields && l.fields.length)
      ? '<div class="lg-fields-label">Home Fields</div>' + l.fields.map(fieldHTML).join('')
      : '<div class="lg-nofield">See the league website for field locations.</div>';
    var visit = l.website ? '<a class="lg-visit" href="' + esc(l.website) + '" target="_blank" rel="noopener">Visit site →</a>' : '';
    var logo = window.D27logos ? '<span class="lg-logo">' + D27logos.html(l.name, 84) + '</span>' : '';
    return '<div class="lg-card"><div class="lg-head"><div class="lg-title">' + logo + '<h2>' + esc(l.name) + '</h2></div>' + visit + '</div>' +
      '<div class="lg-body">' + fields + '</div></div>';
  }
  (async function(){
    var out = document.getElementById('leagues');
    try {
      var res = await fetch('data/leagues.json');
      var data = await res.json();
      var list = (data.leagues || []).slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
      out.innerHTML = list.map(leagueHTML).join('');
    } catch (e) {
      out.innerHTML = '<div class="hub-loading">Could not load leagues. Please refresh.</div>';
    }
  })();
</script>

</body>
</html>
