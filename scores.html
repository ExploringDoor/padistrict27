<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Scores &amp; Schedule · PA District 27 Little League</title>
<meta name="description" content="PA District 27 tournament scores and schedule, day by day — every baseball and softball game across all tournaments." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css" />

<style>
  .hub-hero { background: linear-gradient(135deg, rgba(0,27,71,.95) 0%, rgba(0,45,114,.88) 100%), var(--d27-navy); color: var(--d27-white); padding: var(--space-7) 0 var(--space-6); }
  .hub-hero .crumb { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: var(--space-3); }
  .hub-hero .crumb a { color: rgba(255,255,255,.6); text-decoration: none; }
  .hub-hero h1 { color: var(--d27-white); font-size: clamp(2.25rem, 4vw, var(--text-4xl)); margin-bottom: var(--space-3); }
  .hub-hero p { color: rgba(255,255,255,.82); font-size: var(--text-lg); max-width: 60ch; }

  .sc-tabs { display: flex; gap: 8px; margin-bottom: var(--space-5); flex-wrap: wrap; }
  .sc-tab { font-family: 'Oswald', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; padding: 9px 20px; border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--d27-navy); cursor: pointer; }
  .sc-tab.active { background: var(--d27-navy); color: #fff; border-color: var(--d27-navy); }

  .sc-day { margin-bottom: var(--space-5); }
  .sc-day-head { font-family: 'Oswald', sans-serif; font-size: var(--text-sm); letter-spacing: .06em; text-transform: uppercase; color: #fff; background: var(--d27-navy); padding: 9px 16px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
  .sc-day-head .today { background: var(--d27-gold); color: var(--d27-navy); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; letter-spacing: .08em; }
  .sc-games { border: 1px solid var(--line); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .sc-game { display: grid; grid-template-columns: 84px 1fr minmax(0,150px) auto; gap: 14px; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--line); background: var(--surface); }
  .sc-game:last-child { border-bottom: none; }
  .sc-game:hover { background: rgba(0,45,114,.02); }
  .sc-time { text-align: center; }
  .sc-time .t { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 15px; color: var(--d27-navy); line-height: 1.1; }
  .sc-time .tag { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-top: 1px; }
  .sc-match { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .sc-team { font-weight: 600; color: var(--d27-ink); }
  .sc-team.tbd { color: var(--muted); font-weight: 500; }
  .sc-team.win { color: var(--d27-navy); font-weight: 800; }
  .sc-score { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 17px; color: var(--d27-navy); padding: 0 2px; }
  .sc-vs { color: var(--muted); font-size: 12px; }
  .sc-final { font-size: 10px; background: #ECFDF5; color: #047857; padding: 2px 7px; border-radius: 3px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .sc-final.forfeit { background: #FEF3C7; color: #92400E; }
  .sc-field { font-size: 12px; color: var(--muted); text-align: right; }
  @media (max-width: 640px) { .sc-game { grid-template-columns: 70px 1fr auto; } .sc-field { grid-column: 1 / -1; text-align: left; padding-left: 84px; } }
  .hub-loading { padding: var(--space-6); text-align: center; color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: .04em; }
</style>
</head>
<body>

<div id="d27-nav"></div>

<header class="hub-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Scores &amp; Schedule</div>
    <h1>Scores &amp; Schedule</h1>
    <p>Every District 27 game, day by day — across all baseball and softball tournaments. Finished games show the result; upcoming games show the matchup.</p>
  </div>
</header>

<main class="container section-tight">
  <div class="sc-tabs" id="scTabs">
    <button class="sc-tab active" data-tab="all">All</button>
    <button class="sc-tab" data-tab="results">Results</button>
    <button class="sc-tab" data-tab="upcoming">Upcoming</button>
  </div>
  <div id="scFeed"><div class="hub-loading">Loading games…</div></div>
</main>

<div id="d27-footer"></div>

<script src="js/d27-data.js"></script>
<script src="js/d27-bracket.js"></script>
<script src="js/d27-scores.js"></script>
<script src="js/d27-gamemodal.js"></script>
<script src="js/d27-chrome.js"></script>
<script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function clean(v){ if(v==null) return ''; var s=String(v).trim(); return /^(n\/?a|tbd|tba|none|-+)$/i.test(s) ? '' : s; }
  function fmtTime(t){ t=clean(t); if(!t) return 'TBD'; var p=t.split(':'); var h=+p[0], m=p[1]||'00'; if(isNaN(h)) return 'TBD'; var ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap; }
  function fmtDate(d){ d=clean(d); if(!d) return 'Date TBD'; var dt=new Date(d+'T12:00:00'); if(isNaN(dt)) return 'Date TBD'; return dt.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'}); }
  function isForfeit(g){ var bye=/^\s*bye\s*$/i.test(String(g.away))||/^\s*bye\s*$/i.test(String(g.home)); return D27scores.played(g) && !bye && !clean(g.date); }

  var ALL=[], TAB='all';
  function teamHTML(disp, win){ return '<span class="sc-team'+(win?' win':'')+(disp.tbd?' tbd':'')+'">'+esc(disp.name)+'</span>'; }
  function gameRow(g){
    var A=D27scores.side(g,'away'), H=D27scores.side(g,'home'), played=D27scores.played(g);
    var match;
    if(played){
      var aWin=g.as>g.hs, hWin=g.hs>g.as;
      match=teamHTML(A,aWin)+' <span class="sc-score">'+g.as+'</span><span class="sc-vs">–</span><span class="sc-score">'+g.hs+'</span> '+teamHTML(H,hWin)+(isForfeit(g)?' <span class="sc-final forfeit">Forfeit</span>':' <span class="sc-final">Final</span>');
    } else {
      match=teamHTML(A,false)+' <span class="sc-vs">vs</span> '+teamHTML(H,false);
    }
    return '<div class="sc-game" data-tkey="'+esc(g.tourneyKey)+'" data-g="'+g.g+'"><div class="sc-time"><div class="t">'+fmtTime(g.time)+'</div><div class="tag">'+esc(String(g.tourneyKey).replace(/_/g,' '))+'</div></div>'+
      '<div class="sc-match">'+match+'</div><div class="sc-field">'+esc(clean(g.field))+'</div>'+
      '<span class="gm-cue '+(played?'recap':'preview')+'">'+(played?'Recap':'Preview')+' ›</span></div>';
  }
  function render(){
    var out=document.getElementById('scFeed');
    var games=ALL.filter(function(g){
      if(TAB==='results') return D27scores.played(g);
      if(TAB==='upcoming') return !D27scores.played(g);
      return true;
    });
    var byDate={}, dates=[];
    games.forEach(function(g){ var d=g.date||'TBD'; if(!byDate[d]){byDate[d]=[];dates.push(d);} byDate[d].push(g); });
    dates.sort(function(a,b){ return a==='TBD'?1 : b==='TBD'?-1 : a.localeCompare(b); });
    if(TAB==='results') dates.reverse();  // most recent results first
    var today=D27scores.todayISO(), html='';
    dates.forEach(function(d){
      var gs=byDate[d].sort(function(a,b){ return String(a.time||'').localeCompare(String(b.time||'')); });
      html+='<div class="sc-day"><div class="sc-day-head"><span>'+fmtDate(d)+'</span>'+(d===today?'<span class="today">Today</span>':'')+'</div><div class="sc-games">'+gs.map(gameRow).join('')+'</div></div>';
    });
    out.innerHTML = html || '<div class="hub-loading">No '+(TAB==='results'?'results':TAB==='upcoming'?'upcoming games':'games')+' yet.</div>';
  }
  document.getElementById('scTabs').addEventListener('click', function(e){
    var b=e.target.closest('.sc-tab'); if(!b) return;
    TAB=b.dataset.tab;
    document.querySelectorAll('.sc-tab').forEach(function(x){ x.classList.toggle('active', x===b); });
    render();
  });
  document.getElementById('scFeed').addEventListener('click', function(e){
    var card=e.target.closest('.sc-game[data-g]');
    if(card) D27gameModal.openByKey(card.dataset.tkey, card.dataset.g);
  });
  (async function(){
    try { var data=await D27loadSchedules(); D27gameModal.setData(data.tournaments); ALL=D27scores.allGames(data); render(); }
    catch(e){ document.getElementById('scFeed').innerHTML='<div class="hub-loading">Could not load games. Please refresh.</div>'; }
  })();
</script>

</body>
</html>
