<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Schedule · PA District 27 Little League</title>
<meta name="description" content="Every PA District 27 tournament game — baseball and softball — by week and day. Tap a game for its preview, recap, and bracket." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
<script src="js/d27-data.js"></script>
<script src="js/d27-order.js"></script>
<script src="js/d27-bracket.js"></script>
<script src="js/d27-scores.js"></script>
<script src="js/d27-logos.js"></script>
<script src="js/d27-gamemodal.js"></script>
<script src="js/d27-chrome.js"></script>
<style>
  .sv-wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 80px; }

  /* Hero — matches the other D27 pages */
  .hub-hero { background: linear-gradient(90deg, rgba(4,16,42,.94) 0%, rgba(4,16,42,.80) 40%, rgba(4,16,42,.44) 72%, rgba(4,16,42,.22) 100%), url('assets/schedule.jpg') center/cover no-repeat, var(--d27-navy); color: var(--d27-white); padding: var(--space-7) 0 var(--space-6); }
  .hub-hero .crumb { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .14em; color: var(--gold); margin-bottom: var(--space-3); }
  .hub-hero .crumb a { color: rgba(255,255,255,.6); text-decoration: none; }
  .hub-hero .crumb a:hover { color: var(--d27-white); }
  .hub-hero h1 { color: var(--d27-white); font-size: clamp(2.25rem, 4vw, var(--text-4xl)); margin-bottom: var(--space-3); }
  .hub-hero p { color: rgba(255,255,255,.82); font-size: var(--text-lg); max-width: 60ch; margin-bottom: var(--space-5); }
  .hub-stats { display: flex; gap: var(--space-6); flex-wrap: wrap; }
  .hub-stat .n { font-family: 'Oswald', sans-serif; font-size: var(--text-3xl); font-weight: 600; color: var(--gold); display: block; line-height: 1; }
  .hub-stat .l { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.7); }
  /* Scores ⇄ Schedule segmented switch */
  .sv-switch { display: inline-flex; background: #e9edf2; border-radius: 999px; padding: 4px; gap: 2px; margin-bottom: 20px; }
  .sv-switch a { padding: 8px 26px; border-radius: 999px; font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: .03em; text-transform: uppercase; color: #6b7280; text-decoration: none; transition: all .12s ease; }
  .sv-switch a:hover { color: var(--d27-navy); }
  .sv-switch a.active { background: #fff; color: var(--d27-navy); box-shadow: 0 1px 4px rgba(0,23,60,.14); }

  /* week selector */
  .sv-weeks-row { display: flex; align-items: stretch; gap: 0; padding: 20px 0 0; }
  .sv-wk-arrow { flex: none; width: 34px; border: none; background: none; cursor: pointer; font-size: 20px; color: var(--d27-navy); display: flex; align-items: center; justify-content: center; }
  .sv-wk-arrow:disabled { opacity: .25; cursor: default; }
  .sv-weeks { display: flex; gap: 30px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 14px; flex: 1; scrollbar-width: none; }
  .sv-weeks::-webkit-scrollbar { display: none; }
  .sv-wk { flex: none; text-align: center; background: none; border: none; cursor: pointer; padding: 8px 10px 12px; border-bottom: 2px solid transparent; }
  .sv-wk .d { display: block; font-family: var(--font-display); font-size: 15px; font-weight: 600; color: #6b7280; white-space: nowrap; }
  .sv-wk:hover .d { color: var(--d27-navy); }
  .sv-wk.active { border-bottom-color: var(--d27-navy); }
  .sv-wk.active .d { color: var(--d27-navy); }

  /* panel under the weeks */
  .sv-panel { background: #f4f6f9; border-radius: 14px; padding: 22px 22px 26px; margin-top: 8px; }
  .sv-panel-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .sv-panel-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--d27-ink, #14213D); }
  .sv-panel-title .games { color: #9aa3af; font-weight: 500; font-size: 15px; margin-left: 4px; }
  .sv-day-pills { display: flex; gap: 12px; flex-wrap: wrap; }
  .sv-pill { font-family: var(--font-display); font-size: 15px; font-weight: 600; padding: 9px 20px; border-radius: 999px; border: 1.5px solid #d6dbe2; background: #fff; color: #4b5563; cursor: pointer; white-space: nowrap; transition: all .12s ease; }
  .sv-pill:hover { border-color: var(--d27-navy); }
  .sv-pill.active { background: var(--d27-navy); color: #fff; border-color: var(--d27-navy); }
  .sv-tourney-sel { margin-left: auto; padding: 9px 12px; border: 1.5px solid #d6dbe2; border-radius: 8px; font: inherit; font-size: 14px; background: #fff; color: var(--d27-navy); }

  /* card grid */
  .sv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 18px; }
  .sv-card { background: #fff; border: 1px solid #e7eaef; border-radius: 12px; overflow: hidden; cursor: pointer; transition: box-shadow .15s ease, transform .15s ease; display: flex; flex-direction: column; }
  .sv-card:hover { box-shadow: 0 14px 30px rgba(0,23,60,.13); transform: translateY(-3px); }
  .sv-card-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #eef1f5; }
  .sv-meta { font-family: var(--font-display); font-size: 11.5px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #9aa3af; line-height: 1.4; }
  .sv-card-head .sv-meta { flex: 1; min-width: 0; }
  .sv-status { flex: none; font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: #9aa3af; white-space: nowrap; }
  .sv-status.big { color: var(--d27-navy); }
  .sv-status.ff { color: #92400E; }
  .sv-status.ppd { color: #B45309; }
  .sv-card.ppd { background: #FFFBF5; }
  .sv-makeup { display: block; font-size: 10px; font-weight: 600; letter-spacing: .02em; color: #9aa3af; text-transform: none; margin-top: 1px; }
  .sv-summary { font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: .02em; text-transform: uppercase; color: var(--d27-navy); white-space: nowrap; }
  .sv-summary.ff { color: #92400E; }
  .sv-rows { padding: 6px 16px; }
  .sv-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; }
  .sv-row .d27-logo, .sv-row .d27-logo-fb { flex: none; }
  .sv-team { flex: 1; min-width: 0; font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--d27-ink, #14213D); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sv-team.tbd { color: #9aa3af; font-weight: 500; }
  .sv-team.lose { color: #9aa3af; }
  .sv-score { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--d27-ink, #14213D); line-height: 1; }
  .sv-score.lose { color: #b5bcc6; }
  .sv-card-foot { padding: 11px 16px; border-top: 1px solid #eef1f5; margin-top: auto; }
  .sv-cta { font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--d27-navy); }
  .sv-cta.recap { color: var(--gold-deep, #9a7b16); }
  .sv-empty { padding: 50px 20px; text-align: center; color: #9aa3af; font-family: var(--font-display); }
  .sv-loading { padding: 60px 20px; text-align: center; color: #9aa3af; font-family: var(--font-display); }
  @media (max-width: 560px){ .sv-tab{font-size:21px;} .sv-grid{grid-template-columns:1fr;} .sv-tourney-sel{margin-left:0;width:100%;} }
</style>
</head>
<body>
<div id="d27-nav"></div>

<header class="hub-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Schedule</div>
    <h1>2026 Schedule</h1>
    <p>Every PA District 27 tournament game — baseball and softball — by week and day. Tap a game for its preview and bracket.</p>
    <div class="hub-stats" id="svHeroStats"></div>
  </div>
</header>

<div class="sv-wrap">
  <div class="sv-switch">
    <a href="scores.html">Scores</a>
    <a class="active" href="live-schedule.html">Schedule</a>
  </div>

  <div class="sv-weeks-row">
    <button class="sv-wk-arrow" id="svPrev" aria-label="Previous weeks">‹</button>
    <div class="sv-weeks" id="svWeeks"></div>
    <button class="sv-wk-arrow" id="svNext" aria-label="More weeks">›</button>
  </div>

  <div class="sv-panel">
    <div class="sv-panel-head">
      <span class="sv-panel-title" id="svTitle">Loading…</span>
      <div class="sv-day-pills" id="svDays"></div>
      <select class="sv-tourney-sel" id="svLeague"><option value="all">All leagues</option></select>
      <select class="sv-tourney-sel" id="svTourney" style="margin-left:8px"><option value="all">All tournaments</option></select>
    </div>
    <div id="svGrid"><div class="sv-loading">Loading schedule…</div></div>
  </div>
</div>

<div id="d27-footer"></div>

<script>
(function(){
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };
  var clean = function(v){ if(v==null) return ''; var s=String(v).trim(); return /^(n\/?a|tbd|tba|none|-+)$/i.test(s)?'':s; };
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var FMON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var FDOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  function dt(s){ s=clean(s); return s ? new Date(s+'T12:00:00') : null; }
  function fmtTime(t){ t=clean(t); if(!t) return 'TBD'; var p=t.split(':'); var h=+p[0], m=p[1]||'00'; if(isNaN(h)) return 'TBD'; var ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+ap; }
  function weekStart(s){ var d=dt(s); if(!d) return null; var day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
  function isForfeit(g){ if(!D27scores.played(g)) return false; if(g.forfeit!=null) return !!g.forfeit; var bye=/^\s*bye\s*$/i.test(String(g.away))||/^\s*bye\s*$/i.test(String(g.home)); return !bye && !clean(g.date); }
  function isPpd(g){ return !!(g && g.status==='ppd'); }
  function ppdLabel(g){ return 'POSTPONED · ' + (g && g.ppdReason==='field' ? 'Field Closed' : 'Rain'); }
  function ppdMakeup(g){ var m=clean(g&&g.makeupDate); if(!m) return ''; var d=new Date(m+'T12:00:00'); return isNaN(d)?'':'Makeup '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

  var DATA=null, TMAP={}, WEEKS=[], state={wk:0, day:null, tourney:'all', league:'all'};

  // League filter — canonicalize each team to its league via the logo slug
  // (unifies variants like GVE1 / Great Valley Exton, Coventry 1, Upper Prov / Upper Providence).
  var LEAGUE_DISP = {};   // league key -> clean display name
  function baseName(n){ return String(n==null?'':n).replace(/\s*\([^)]*\)\s*$/,'').trim(); }
  function isRealTeam(n){ n=String(n==null?'':n).trim(); return !!n && !/^(wg|lg)-/i.test(n) && !/^(bye|tbd|tba)$/i.test(n); }
  function leagueKey(name){ if(!isRealTeam(name)) return null; var s=window.D27logos?D27logos.slug(name):null; return s || baseName(name).toLowerCase(); }
  function sideNames(g){ var out=[]; [D27scores.side(g,'away'),D27scores.side(g,'home')].forEach(function(S){ if(S && !S.tbd && isRealTeam(S.name)) out.push(S.name); }); return out; }
  function gameLeagueKeys(g){ return sideNames(g).map(leagueKey).filter(Boolean); }
  function gameMatchesLeague(g, key){ return gameLeagueKeys(g).indexOf(key)>=0; }

  function build(){
    var games=D27scores.allGames(DATA).filter(function(g){ return clean(g.date); });   // dated games only
    var byWeek={};
    games.forEach(function(g){ var w=weekStart(g.date); (byWeek[w]=byWeek[w]||[]).push(g); });
    WEEKS=Object.keys(byWeek).sort().map(function(w,i){
      var gs=byWeek[w].sort(function(a,b){
        var dc=String(a.date||'').localeCompare(String(b.date||'')); if(dc) return dc;     // date first (day buckets rely on it)
        var tc=(window.D27order?D27order.cmp(a,b):0); if(tc) return tc;                     // then canonical tournament order
        var mc=String(a.time||'').localeCompare(String(b.time||'')); if(mc) return mc;      // then time
        return (+a.g||0)-(+b.g||0);                                                          // then game #
      });
      var dates=gs.map(function(g){return g.date;});
      var lo=dt(dates[0]), hi=dt(dates[dates.length-1]);
      var range = (MON[lo.getMonth()]+' '+lo.getDate()) + (dates[0]!==dates[dates.length-1] ? '–'+(hi.getMonth()!==lo.getMonth()?MON[hi.getMonth()]+' ':'')+hi.getDate() : '');
      var days={}, dorder=[];
      gs.forEach(function(g){ if(!days[g.date]){days[g.date]=[];dorder.push(g.date);} days[g.date].push(g); });
      return { start:w, idx:i, range:range, games:gs, days:days, dayOrder:dorder };
    });
  }

  function pickDefaultWeek(){
    var today=D27scores.todayISO();
    for(var i=0;i<WEEKS.length;i++){ if(today>=WEEKS[i].start && (i===WEEKS.length-1 || today<WEEKS[i+1].start)) return i; }
    for(var j=0;j<WEEKS.length;j++){ if(WEEKS[j].start>=today) return j; }
    return WEEKS.length?WEEKS.length-1:0;
  }

  function fillTourneys(){
    var sel=document.getElementById('svTourney');
    var keys={}; D27scores.allGames(DATA).forEach(function(g){ keys[g.tourneyKey]=1; });
    var arr=Object.keys(keys).sort(function(a,b){ return D27order.cmp(a,b); });
    sel.innerHTML='<option value="all">All tournaments</option>'+arr.map(function(k){ return '<option value="'+esc(k)+'">'+esc(TMAP[k]||k)+'</option>'; }).join('');
  }
  function fillLeagues(){
    var sel=document.getElementById('svLeague');
    LEAGUE_DISP={};
    D27scores.allGames(DATA).forEach(function(g){ sideNames(g).forEach(function(nm){ var k=leagueKey(nm); if(!k) return; var b=baseName(nm); if(!LEAGUE_DISP[k] || b.length<LEAGUE_DISP[k].length) LEAGUE_DISP[k]=b; }); });
    var entries=Object.keys(LEAGUE_DISP).map(function(k){ return {key:k, name:LEAGUE_DISP[k]}; }).sort(function(a,b){ return a.name.localeCompare(b.name); });
    sel.innerHTML='<option value="all">All leagues</option>'+entries.map(function(e){ return '<option value="'+esc(e.key)+'">'+esc(e.name)+'</option>'; }).join('');
  }

  function renderWeeks(){
    var el=document.getElementById('svWeeks');
    el.innerHTML=WEEKS.map(function(w){
      return '<button class="sv-wk'+(w.idx===state.wk?' active':'')+'" data-wk="'+w.idx+'"><span class="d">'+esc(w.range)+'</span></button>';
    }).join('');
    var active=el.querySelector('.sv-wk.active'); if(active) active.scrollIntoView({block:'nearest',inline:'center'});
  }

  function gameInFilter(g){ return (state.tourney==='all'||g.tourneyKey===state.tourney) && (state.league==='all'||gameMatchesLeague(g,state.league)); }
  function weekHasMatch(w){ return w.games.some(gameInFilter); }
  // when a filter changes, hop to the nearest week (today-forward, else latest) that actually has matching games
  function ensureWeekWithGames(){
    if(WEEKS[state.wk] && weekHasMatch(WEEKS[state.wk])) return;
    var today=D27scores.todayISO(), fwd=null, any=null;
    for(var i=0;i<WEEKS.length;i++){ if(weekHasMatch(WEEKS[i])){ any=i; if(fwd===null && WEEKS[i].start>=today) fwd=i; } }
    state.wk = (fwd!==null)?fwd:(any!==null?any:state.wk); state.day=null; renderWeeks();
  }
  function curGames(){
    var w=WEEKS[state.wk]; if(!w) return [];
    var gs = state.day ? (w.days[state.day]||[]) : w.games;
    if(state.tourney!=='all') gs=gs.filter(function(g){ return g.tourneyKey===state.tourney; });
    if(state.league!=='all') gs=gs.filter(function(g){ return gameMatchesLeague(g, state.league); });
    return gs;
  }

  function renderPanel(){
    var w=WEEKS[state.wk]; if(!w) return;
    var validDays=w.dayOrder.filter(function(d){ return (w.days[d]||[]).some(function(g){ return (state.tourney==='all'||g.tourneyKey===state.tourney) && (state.league==='all'||gameMatchesLeague(g,state.league)); }); });
    if(state.day && validDays.indexOf(state.day)<0) state.day=null;
    if(!state.day && validDays.length){ var tdy=D27scores.todayISO(); state.day=validDays.filter(function(d){return d>=tdy;})[0]||validDays[validDays.length-1]; }
    document.getElementById('svDays').innerHTML=validDays.map(function(d){
      var dd=dt(d); var lbl=MON[dd.getMonth()]+' '+dd.getDate();
      return '<button class="sv-pill'+(d===state.day?' active':'')+'" data-day="'+d+'">'+lbl+'</button>';
    }).join('');
    var gs=curGames();
    var sd=dt(state.day);
    var dayLbl=sd ? (FDOW[sd.getDay()]+', '+FMON[sd.getMonth()]+' '+sd.getDate()) : (WEEKS[state.wk]?WEEKS[state.wk].range:'');
    document.getElementById('svTitle').innerHTML=esc(dayLbl)+' <span class="games">'+gs.length+' game'+(gs.length===1?'':'s')+'</span>';
    renderGrid(gs);
  }

  function teamRow(disp, score, win, played){
    var logo = (!disp.tbd && window.D27logos) ? D27logos.html(disp.name, 30) : '';
    var sc = played ? '<span class="sv-score'+(win?' win':' lose')+'">'+score+'</span>' : '';
    return '<div class="sv-row">'+logo+'<span class="sv-team'+(disp.tbd?' tbd':'')+(played&&win?' win':'')+(played&&!win?' lose':'')+'">'+esc(disp.name)+'</span>'+sc+'</div>';
  }
  function sportCls(g){ var t=g._t||{}; if(t.category==='Sectional'||t.category==='State') return 'sp-ss'; if(t.category==='D27 Special Games'||t.special===true) return 'sp-sg'; return g.sport==='Softball'?'sp-sb':'sp-bb'; }
  function card(g){
    var ppd=isPpd(g);
    var d=dt(g.date), played=!ppd&&D27scores.played(g), ff=!ppd&&isForfeit(g);
    var head=(DOW[d.getDay()]+' '+MON[d.getMonth()]+' '+d.getDate()).toUpperCase()+' · '+fmtTime(g.time)+(clean(g.field)?' · '+esc(clean(g.field)).toUpperCase():'');
    var A=D27scores.side(g,'away'), H=D27scores.side(g,'home');
    var aWin=played&&g.as>g.hs, hWin=played&&g.hs>g.as;
    var cta = ppd ? '<span class="sv-cta">Details ›</span>' : (played ? '<span class="sv-cta recap">'+(ff?'Forfeit':'Recap')+' ›</span>' : '<span class="sv-cta">Preview ›</span>');
    var tag = '<span class="sv-meta">'+esc((TMAP[g.tourneyKey]||g.tourneyKey))+'</span>';
    var margin = played ? Math.abs(g.as-g.hs) : 0;
    var status = ppd ? '<span class="sv-status ppd">'+esc(ppdLabel(g))+(ppdMakeup(g)?'<span class="sv-makeup">'+esc(ppdMakeup(g))+'</span>':'')+'</span>'
      : (ff ? '<span class="sv-status ff">Forfeit</span>' : (played ? '<span class="sv-status'+(margin>=10?' big':'')+'">'+(margin>=10?'Wins Big':'Final')+'</span>' : ''));
    return '<div class="sv-card '+sportCls(g)+(ppd?' ppd':'')+'" data-tkey="'+esc(g.tourneyKey)+'" data-g="'+g.g+'">'+
      '<div class="sv-card-head"><span class="sv-meta">'+head+'</span>'+status+'</div>'+
      '<div class="sv-rows">'+teamRow(A,g.as,aWin,played)+teamRow(H,g.hs,hWin,played)+'</div>'+
      '<div class="sv-card-foot">'+tag+' &nbsp;·&nbsp; '+cta+'</div></div>';
  }
  function renderGrid(gs){
    var out=document.getElementById('svGrid');
    if(!gs.length){ out.innerHTML='<div class="sv-empty">No games'+(state.league!=='all'?' for '+esc(LEAGUE_DISP[state.league]||state.league):'')+(state.tourney!=='all'?' in this tournament':'')+' this day.</div>'; return; }
    out.innerHTML='<div class="sv-grid">'+gs.map(card).join('')+'</div>';
  }

  document.getElementById('svWeeks').addEventListener('click',function(e){ var b=e.target.closest('.sv-wk'); if(!b) return; state.wk=+b.dataset.wk; state.day=null; renderWeeks(); renderPanel(); });
  document.getElementById('svDays').addEventListener('click',function(e){ var b=e.target.closest('.sv-pill'); if(!b) return; state.day=b.dataset.day; renderPanel(); });
  document.getElementById('svTourney').addEventListener('change',function(e){ state.tourney=e.target.value; ensureWeekWithGames(); renderPanel(); });
  document.getElementById('svLeague').addEventListener('change',function(e){ state.league=e.target.value; ensureWeekWithGames(); renderPanel(); });
  document.getElementById('svPrev').addEventListener('click',function(){ document.getElementById('svWeeks').scrollBy({left:-240,behavior:'smooth'}); });
  document.getElementById('svNext').addEventListener('click',function(){ document.getElementById('svWeeks').scrollBy({left:240,behavior:'smooth'}); });
  document.getElementById('svGrid').addEventListener('click',function(e){ var c=e.target.closest('.sv-card'); if(c) D27gameModal.openByKey(c.dataset.tkey, c.dataset.g); });

  D27loadSchedules().then(function(d){
    DATA=d; (d.tournaments||[]).forEach(function(t){ TMAP[t.key]=t.name; });
    D27gameModal.setData(d.tournaments);
    build();
    (function(){ var ag=D27scores.allGames(DATA).filter(function(g){return clean(g.date);}); var gt={}; ag.forEach(function(g){ gt[g.tourneyKey]=1; }); var nT=Object.keys(gt).length; var hs=document.getElementById('svHeroStats'); if(hs) hs.innerHTML='<div class="hub-stat"><span class="n">'+ag.length+'</span><span class="l">Game'+(ag.length===1?'':'s')+'</span></div><div class="hub-stat"><span class="n">'+nT+'</span><span class="l">Tournament'+(nT===1?'':'s')+'</span></div>'; })();
    if(!WEEKS.length){ document.getElementById('svGrid').innerHTML='<div class="sv-empty">No scheduled games yet.</div>'; document.getElementById('svTitle').textContent=''; return; }
    state.wk=pickDefaultWeek();
    fillTourneys(); fillLeagues(); renderWeeks(); renderPanel();
  }).catch(function(e){ document.getElementById('svGrid').innerHTML='<div class="sv-empty">Could not load the schedule.</div>'; });
})();
</script>
