<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D27 — Champion Banner Font Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Oswald:wght@500;600;700&family=Saira+Condensed:wght@700;800&family=Teko:wght@600;700&display=swap">
<link rel="stylesheet" href="css/styles.css">
<style>
  body { background:#f4f6f9; margin:0; padding:0 16px 70px; }
  .wrap { max-width: 880px; margin: 0 auto; }
  .pg-head { padding: 30px 4px 6px; }
  .pg-head h1 { font-family: var(--font-display); color: var(--d27-navy); font-size: 27px; margin: 0 0 6px; letter-spacing:.01em; }
  .pg-head p { color:#556; margin:.2em 0; font-size:15px; }
  .namerow { margin: 16px 0 6px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .namerow label { font-weight:700; color: var(--d27-navy); font-family: var(--font-display); }
  .namerow input { font-size:16px; padding:8px 12px; border:1px solid #cbd5e1; border-radius:8px; min-width:230px; }
  .namerow button { font-size:13px; padding:7px 11px; border:1px solid #cbd5e1; background:#fff; border-radius:20px; cursor:pointer; color:var(--d27-navy); font-weight:600; }
  .namerow button:hover { background:#eef2f7; }
  .opt { margin: 24px 0; }
  .opt-label { font-family: var(--font-display); font-weight:700; color: var(--d27-navy); font-size:18px; margin: 0 2px 8px; }
  .opt-label span { color:#64748b; font-weight:500; font-size:14px; }

  /* champion banner — mirrored from brackets.html */
  .bk-champion { background: linear-gradient(120deg, #C9A227, #EBCB5E 45%, #C9A227); color: var(--d27-navy); border-radius: 14px; padding: 13px 30px; display: flex; align-items: center; justify-content: center; gap: 26px; box-shadow: 0 10px 34px rgba(201,162,39,.45); position: relative; overflow: hidden; animation: champShine 3s ease-in-out infinite; }
  @keyframes champShine { 50% { box-shadow: 0 10px 44px rgba(201,162,39,.7); } }
  .bk-champion::after { content: ''; position: absolute; right: -30px; top: -40px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,.4), transparent 60%); pointer-events: none; }
  .bk-champion .ct { position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 7px; z-index:2; }
  .bk-champion .ct .lbl { font-family: var(--font-display); letter-spacing: .2em; font-size: 13px; font-weight: 700; text-transform: uppercase; opacity: .85; }
  .bk-champion .ct .team { font-family: var(--font-display); font-size: clamp(30px, 6vw, 58px); font-weight: 700; line-height: 1; letter-spacing: -.01em; }
  .bk-champion .ct .tourn { font-family: var(--font-display); letter-spacing: .14em; font-size: 14px; font-weight: 700; text-transform: uppercase; opacity: .92; }
  .bk-champion .bk-neon { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 14px; pointer-events: none; z-index: 1; overflow: visible; }
  .bk-champion .bk-trophy-img { height: clamp(120px, 23vw, 172px); width: auto; object-fit: contain; display: block; position: relative; flex: none; z-index:2; filter: drop-shadow(0 3px 7px rgba(0,45,114,.45)); }
  .bk-neon-rail { fill: none; stroke: rgba(0,45,114,.16); stroke-width: 1; }
  .bk-neon-glow { fill: none; stroke: #EBCB5E; stroke-width: 3.4; stroke-linecap: round; stroke-dasharray: 60 540; filter: url(#bkNeonBlur); opacity: .85; animation: bkNeonTravel 4.4s linear infinite; }
  .bk-neon-core { fill: none; stroke: #F4FBFF; stroke-width: 1.6; stroke-linecap: round; stroke-dasharray: 38 562; animation: bkNeonTravel 4.4s linear infinite; filter: drop-shadow(0 0 3px #8FE9FF) drop-shadow(0 0 6px rgba(143,233,255,.6)); }
  @keyframes bkNeonTravel { to { stroke-dashoffset: -600; } }
  @media (prefers-reduced-motion: reduce){ .bk-champion{animation:none} .bk-neon-glow,.bk-neon-core{animation:none;stroke-dasharray:none} }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><filter id="bkNeonBlur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3"/></filter></defs></svg>
<div class="wrap">
  <div class="pg-head">
    <h1>Champion Banner — Font Options</h1>
    <p>The real banner (your trophy + the moving neon) shown in each font. Type a team name below to see how each one handles short and long names.</p>
  </div>
  <div class="namerow">
    <label for="nm">Team name:</label>
    <input id="nm" value="Chester Valley">
    <button data-n="Exton">Exton</button>
    <button data-n="Lower Perkiomen">Lower Perkiomen</button>
    <button data-n="Pottsgrove-Pottstown">Pottsgrove-Pottstown</button>
  </div>
  <div id="opts"></div>
</div>
<script>
const FONTS = [
  {name:'Anton',            css:"'Anton',sans-serif",            note:'Heavy condensed — max impact, broadcast energy', extra:'letter-spacing:.01em;'},
  {name:'Bebas Neue',       css:"'Bebas Neue',sans-serif",       note:'Tall, narrow, all-caps — sleek + modern',       extra:'letter-spacing:.03em;'},
  {name:'Archivo Black',    css:"'Archivo Black',sans-serif",    note:'Heavy, wide, geometric — bold + contemporary',  extra:'font-size:clamp(22px,4.4vw,42px);letter-spacing:-.01em;'},
  {name:'Saira Condensed',  css:"'Saira Condensed',sans-serif",  note:'Modern athletic condensed — clean + readable',  extra:'font-weight:800;font-size:clamp(32px,6.6vw,62px);'},
  {name:'Teko',             css:"'Teko',sans-serif",             note:'Light, tall, techy-modern',                         extra:'font-weight:700;font-size:clamp(34px,7.2vw,68px);'},
  {name:'Oswald (current)', css:"'Oswald',sans-serif",           note:'Your current font — classic condensed',        extra:''},
];
const NEON = '<svg class="bk-neon" viewBox="0 0 1000 200" preserveAspectRatio="none" aria-hidden="true">'
  + '<rect class="bk-neon-rail" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>'
  + '<rect class="bk-neon-glow" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>'
  + '<rect class="bk-neon-core" pathLength="600" x="2.5" y="2.5" width="995" height="195" rx="55" ry="55" vector-effect="non-scaling-stroke"/>'
  + '</svg>';
let style = '', html = '';
FONTS.forEach((f,i) => {
  const c = 'f'+i;
  style += '.bk-champion.'+c+' .ct .team{font-family:'+f.css+';'+(f.extra||'')+'}'
        +  '.bk-champion.'+c+' .ct .lbl,.bk-champion.'+c+' .ct .tourn{font-family:'+f.css+'}';
  html += '<div class="opt"><div class="opt-label">'+(i+1)+'. '+f.name+' <span>— '+f.note+'</span></div>'
       +  '<div class="bk-champion '+c+'">'+NEON
       +  '<img class="bk-trophy-img" src="assets/d27-trophy.png?v=3" alt="champion trophy">'
       +  '<div class="ct"><div class="tourn">Senior League Softball</div><div class="lbl">★ Tournament Champion ★</div><div class="team">Chester Valley</div></div>'
       +  '</div></div>';
});
const st = document.createElement('style'); st.textContent = style; document.head.appendChild(st);
document.getElementById('opts').innerHTML = html;
const nm = document.getElementById('nm');
function setName(v){ document.querySelectorAll('.bk-champion .team').forEach(t=>t.textContent = v || 'Chester Valley'); }
nm.addEventListener('input', ()=>setName(nm.value));
document.querySelectorAll('.namerow button').forEach(b=>b.addEventListener('click', ()=>{ nm.value=b.dataset.n; setName(b.dataset.n); }));
</script>
</body>
</html>
