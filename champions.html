<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#002D72" />
<title>Champions · PA District 27 Little League</title>
<meta name="description" content="PA District 27 Little League tournament champions — the current season plus the past-champions archive (2021–2025): Bob Jones, John Klein, International divisions, State & Regional titles." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css" />

<style>
  .hub-hero { background: linear-gradient(135deg, rgba(0,27,71,.95) 0%, rgba(201,162,39,.28) 100%), var(--d27-navy); color: var(--d27-white); padding: var(--space-7) 0 var(--space-6); }
  .hub-hero .crumb { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: var(--space-3); }
  .hub-hero .crumb a { color: rgba(255,255,255,.6); text-decoration: none; }
  .hub-hero h1 { color: var(--d27-white); font-size: clamp(2.25rem, 4vw, var(--text-4xl)); margin-bottom: var(--space-3); }
  .hub-hero p { color: rgba(255,255,255,.82); font-size: var(--text-lg); max-width: 60ch; }

  .champ-year { margin-bottom: var(--space-7); }
  .champ-year-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-4); padding-bottom: var(--space-3); border-bottom: 2px solid var(--d27-navy); }
  .champ-year-head h2 { margin: 0; font-size: var(--text-2xl); color: var(--d27-navy); }
  .champ-year-head .tag { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .champ-year.current .champ-year-head h2 { color: var(--gold-deep, #9a7b16); }
  .champ-year.current .champ-year-head { border-bottom-color: var(--gold); }

  .champ-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--space-4); }
  .champ-card { display: flex; align-items: center; gap: var(--space-3); background: var(--surface); border: 1px solid var(--line); border-left: 4px solid var(--gold); border-radius: var(--radius); padding: var(--space-4); position: relative; transition: box-shadow .15s ease, transform .12s ease; }
  .champ-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .champ-card .trophy { font-size: 2rem; line-height: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,.15)); }
  .champ-card .info { min-width: 0; flex: 1; }
  .champ-card .tourney { font-family: 'Oswald', sans-serif; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .champ-card .team { font-family: 'Oswald', sans-serif; font-size: var(--text-xl); font-weight: 600; color: var(--d27-navy); line-height: 1.1; margin-top: 2px; }
  .champ-card .note { font-size: var(--text-xs); color: var(--muted); margin-top: 3px; }
  .champ-card .sport { position: absolute; top: 10px; right: 10px; font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; }
  .champ-card .sport.bb { background: rgba(0,45,114,.1); color: var(--d27-navy); }
  .champ-card .sport.sb { background: rgba(218,41,28,.1); color: var(--d27-red); }

  .champ-empty { padding: var(--space-5); border: 1px dashed var(--line); border-radius: var(--radius); color: var(--muted); text-align: center; }
  .champ-note-src { color: var(--muted); font-size: var(--text-xs); margin-top: var(--space-5); }
  .hub-loading { padding: var(--space-6); text-align: center; color: var(--muted); font-family: 'Oswald', sans-serif; letter-spacing: .04em; }

  /* photo gallery */
  .cg-title { font-family: 'Oswald', sans-serif; font-size: var(--text-2xl); color: var(--d27-navy); margin: var(--space-6) 0 var(--space-2); }
  .cg-sub { color: var(--muted); margin-bottom: var(--space-5); }
  .cg-year { margin-bottom: var(--space-6); }
  .cg-year h3 { font-family: 'Oswald', sans-serif; font-size: var(--text-xl); color: var(--d27-navy); margin: 0 0 var(--space-3); padding-bottom: var(--space-2); border-bottom: 2px solid var(--gold); }
  .cg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(184px, 1fr)); gap: var(--space-4); }
  .cg-item { position: relative; display: flex; flex-direction: column; padding: 0; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; background: var(--surface); cursor: pointer; text-align: left; font: inherit; transition: transform .15s ease, box-shadow .15s ease; }
  .cg-item:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(0,23,60,.16); }
  .cg-meta { padding: 10px 12px 8px; }
  .cg-ttl { font-family: 'Oswald', sans-serif; font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); line-height: 1.25; }
  .cg-team { display: flex; align-items: center; gap: 7px; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 15px; color: var(--d27-navy); line-height: 1.15; margin-top: 2px; }
  .cg-item img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; display: block; background: var(--d27-sub, #eef2f7); }
  .cg-zoom { position: absolute; bottom: 8px; right: 8px; font-family: 'Oswald', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #fff; background: rgba(0,18,48,.66); padding: 3px 8px; border-radius: 4px; opacity: 0; transition: opacity .15s ease; pointer-events: none; }
  .cg-item:hover .cg-zoom { opacity: 1; }
  .cg-lb { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; background: rgba(0,18,48,.9); padding: 24px; }
  .cg-lb.open { display: flex; }
  .cg-lb figure { margin: 0; max-width: 94vw; max-height: 90vh; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .cg-lb img { max-width: 94vw; max-height: 78vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .cg-lb figcaption { color: #fff; font-size: 14px; text-align: center; max-width: 70ch; }
  .cg-lb-close { position: absolute; top: 16px; right: 20px; width: 40px; height: 40px; border: none; border-radius: 50%; background: rgba(255,255,255,.16); color: #fff; font-size: 20px; cursor: pointer; }
  .cg-lb-close:hover { background: rgba(255,255,255,.3); }
</style>
</head>
<body>

<div id="d27-nav"></div>

<header class="hub-hero">
  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> &nbsp;/&nbsp; Champions</div>
    <h1>Tournament Champions</h1>
    <p>District 27's champions — this season's titles update automatically as tournaments finish, followed by the past-champions archive.</p>
  </div>
</header>

<main class="container section-tight" id="champions">
  <div class="hub-loading">Loading champions…</div>
</main>

<section class="container section-tight" id="champPhotos"></section>

<div class="cg-lb" id="cgLightbox"><button class="cg-lb-close" aria-label="Close">✕</button><figure><img id="cgLbImg" alt=""><figcaption id="cgLbCap"></figcaption></figure></div>

<div id="d27-footer"></div>

<script src="js/d27-data.js"></script>
<script src="js/d27-bracket.js"></script>
<script src="js/d27-logos.js"></script>
<script src="js/d27-chrome.js"></script>
<script>
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function card(c){
    var logo = (window.D27logos && D27logos.known(c.team)) ? '<span class="champ-logo">' + D27logos.html(c.team, 44) + '</span>' : '<span class="trophy">🏆</span>';
    return '<div class="champ-card">' +
      logo +
      '<div class="info">' +
        '<div class="tourney">' + esc(c.tournament) + '</div>' +
        '<div class="team">' + esc(c.team) + '</div>' +
        (c.note ? '<div class="note">' + esc(c.note) + '</div>' : '') +
      '</div>' +
      '<span class="sport ' + (c.sport === 'Softball' ? 'sb' : 'bb') + '">' + esc(c.sport) + '</span>' +
    '</div>';
  }
  function yearSection(year, champs, current){
    var head = '<div class="champ-year-head"><h2>' + year + (current ? ' Season' : '') + '</h2>' +
      '<span class="tag">' + champs.length + ' champion' + (champs.length === 1 ? '' : 's') + '</span></div>';
    return '<section class="champ-year' + (current ? ' current' : '') + '">' + head +
      '<div class="champ-grid">' + champs.map(card).join('') + '</div></section>';
  }

  (async function(){
    var out = document.getElementById('champions');
    var html = '';

    // ── Current-season champions, pulled live from the tournament data ──
    try {
      var data = await window.D27loadSchedules();
      var live = [];
      (data.tournaments || []).forEach(function(t){
        try {
          var champ = window.D27bracket.championOutcome(t, window.D27bracket.classify(t)).champion;
          if (champ) live.push({ sport: t.sport, tournament: t.name, team: champ });
        } catch (e) {}
      });
      if (live.length) {
        html += yearSection(2026, live, true);
      } else {
        html += '<section class="champ-year current"><div class="champ-year-head"><h2>2026 Season</h2>' +
          '<span class="tag">In progress</span></div>' +
          '<div class="champ-empty">Champions will appear here automatically as each 2026 tournament finishes.</div></section>';
      }
    } catch (e) {
      html += '<section class="champ-year current"><div class="champ-year-head"><h2>2026 Season</h2></div>' +
        '<div class="champ-empty">Live results are loading — check the brackets for the latest.</div></section>';
    }

    // ── Past champions archive (real, from padistrict27.com/tournament-winners) ──
    try {
      var res = await fetch('data/champions-history.json');
      var hist = await res.json();
      (hist.years || []).forEach(function(y){
        html += yearSection(y.year, y.champions || [], false);
      });
      html += '<p class="champ-note-src">Past champions sourced from the District 27 tournament-winners records.</p>';
    } catch (e) {}

    out.innerHTML = html || '<div class="champ-empty">No champions on record yet.</div>';
  })();

  // ── Photo gallery: champions through the years ──
  (async function(){
    var box = document.getElementById('champPhotos');
    try {
      var res = await fetch('data/champions-photos.json');
      var photos = (await res.json()).photos || [];
      if (!photos.length) return;
      var byYear = {};
      photos.forEach(function(p){ (byYear[p.year] = byYear[p.year] || []).push(p); });
      var years = Object.keys(byYear).sort(function(a,b){ return b - a; });
      var html = '<h2 class="cg-title">📸 Champions Through the Years</h2>' +
        '<p class="cg-sub">Tournament winners from across District 27 — tap any photo to enlarge.</p>';
      years.forEach(function(y){
        html += '<div class="cg-year"><h3>' + y + '</h3><div class="cg-grid">' +
          byYear[y].map(function(p){
            var logo = (window.D27logos && p.team) ? D27logos.html(p.team, 20) : '';
            return '<button type="button" class="cg-item" data-src="' + esc(p.file) + '" data-cap="' + esc(p.caption) + '">' +
              '<div class="cg-meta">' +
                (p.title ? '<div class="cg-ttl">' + esc(p.title) + '</div>' : '') +
                '<div class="cg-team">' + logo + '<span>' + esc(p.team || p.caption) + '</span></div>' +
              '</div>' +
              '<img src="' + esc(p.file) + '" alt="' + esc(p.team || p.caption) + '" loading="lazy">' +
              '<span class="cg-zoom">⤢ View</span></button>';
          }).join('') + '</div></div>';
      });
      box.innerHTML = html;
    } catch (e) {}
  })();

  // ── Lightbox ──
  (function(){
    var lb = document.getElementById('cgLightbox'), img = document.getElementById('cgLbImg'), cap = document.getElementById('cgLbCap');
    function close(){ lb.classList.remove('open'); document.body.style.overflow = ''; }
    document.getElementById('champPhotos').addEventListener('click', function(e){
      var it = e.target.closest('.cg-item'); if (!it) return;
      img.src = it.getAttribute('data-src'); img.alt = it.getAttribute('data-cap') || '';
      cap.textContent = it.getAttribute('data-cap') || '';
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    });
    lb.addEventListener('click', function(e){ if (e.target === lb || e.target.closest('.cg-lb-close')) close(); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
  })();
</script>

</body>
</html>
